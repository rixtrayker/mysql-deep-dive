<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="760" height="400" fill="#0f1419"/>
  <text x="380" y="28" fill="#e6edf3" font-size="17" font-weight="700" text-anchor="middle">5.3 · The 16KB page — fanout sets tree height</text>
  <text x="380" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">page = unit of I/O &amp; caching · keys-per-page = fanout · compact keys → shallower tree</text>

  <!-- page anatomy -->
  <rect x="40" y="75" width="300" height="230" rx="8" fill="#11161c" stroke="#30363d" stroke-width="1.5"/>
  <text x="190" y="95" fill="#e6edf3" text-anchor="middle" font-weight="600">One 16KB InnoDB page</text>
  <rect x="55" y="108" width="270" height="26" rx="4" fill="#1b3a5c"/>
  <text x="190" y="125" fill="#cde3ff" text-anchor="middle" font-size="11">page header (LSN, type, ptrs)</text>
  <rect x="55" y="140" width="270" height="100" rx="4" fill="#143a2a"/>
  <text x="190" y="158" fill="#7ee2a8" text-anchor="middle" font-size="11">sorted records / keys</text>
  <text x="190" y="178" fill="#c7f5d9" text-anchor="middle" font-size="11">k1 · k2 · k3 · … · kN</text>
  <text x="190" y="200" fill="#c7f5d9" text-anchor="middle" font-size="11">(many fit → high fanout)</text>
  <text x="190" y="222" fill="#c7f5d9" text-anchor="middle" font-size="11">→ next-page pointer (linked leaves)</text>
  <rect x="55" y="246" width="270" height="44" rx="4" fill="#3a2a14"/>
  <text x="190" y="264" fill="#f0c674" text-anchor="middle" font-size="11">free space (for inserts)</text>
  <text x="190" y="281" fill="#f5e6c7" text-anchor="middle" font-size="11">full + mid-insert → PAGE SPLIT (5.15)</text>

  <!-- compact vs fat key comparison -->
  <text x="560" y="95" fill="#e6edf3" text-anchor="middle" font-weight="600">key size → fanout → tree height</text>

  <rect x="420" y="115" width="280" height="80" rx="8" fill="#143a2a" stroke="#2ea043" stroke-width="1.5"/>
  <text x="435" y="135" fill="#7ee2a8" font-size="12" font-weight="600">BIGINT key (8 bytes)</text>
  <text x="435" y="155" fill="#c7f5d9" font-size="11">~hundreds of keys / page → fanout high</text>
  <text x="435" y="173" fill="#c7f5d9" font-size="11">3-level tree indexes billions of rows</text>
  <text x="435" y="189" fill="#7ee2a8" font-size="11">→ ~3 page reads per lookup ✓</text>

  <rect x="420" y="210" width="280" height="80" rx="8" fill="#3a1a1a" stroke="#da3633" stroke-width="1.5"/>
  <text x="435" y="230" fill="#ff7b72" font-size="12" font-weight="600">CHAR(36) UUID key (36 bytes)</text>
  <text x="435" y="250" fill="#f5c2c0" font-size="11">~4× fewer keys / page → fanout low</text>
  <text x="435" y="268" fill="#f5c2c0" font-size="11">deeper tree, bigger index, worse cache</text>
  <text x="435" y="284" fill="#ff7b72" font-size="11">→ more page reads (M03/3.12) ✗</text>

  <text x="380" y="340" fill="#58a6ff" font-size="12" font-weight="600" text-anchor="middle">fanout = page_size ÷ key_size   →   height ≈ log_fanout(rows)</text>
  <text x="380" y="362" fill="#8b98a5" font-size="11" text-anchor="middle">smaller keys ⇒ more keys/page ⇒ wider, shallower tree ⇒ fewer I/Os (M03/3.2)</text>
  <text x="380" y="382" fill="#8b98a5" font-size="11" text-anchor="middle">the page is the I/O unit — density per page is a first-order performance lever</text>
</svg>
