<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="760" height="430" fill="#0f1419"/>
  <text x="380" y="28" fill="#e6edf3" font-size="17" font-weight="700" text-anchor="middle">5.15 · When indexes hurt — page splits &amp; write amplification</text>
  <text x="380" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">monotonic key appends cleanly · random key splits pages · every write maintains N indexes</text>

  <!-- monotonic insert (clean) -->
  <text x="40" y="78" fill="#7ee2a8" font-size="13" font-weight="600">✓ MONOTONIC PK (auto-inc / time-ordered) — append to the right edge</text>
  <rect x="40" y="88" width="150" height="46" rx="5" fill="#143a2a" stroke="#2ea043"/>
  <text x="115" y="107" fill="#c7f5d9" text-anchor="middle" font-size="11">page: 41·42·43</text>
  <text x="115" y="125" fill="#a8e6c2" text-anchor="middle" font-size="10">full</text>
  <text x="205" y="115" fill="#7ee2a8" font-size="11">insert 44 →</text>
  <rect x="290" y="88" width="150" height="46" rx="5" fill="#143a2a" stroke="#2ea043"/>
  <text x="365" y="107" fill="#c7f5d9" text-anchor="middle" font-size="11">NEW page: 44·…</text>
  <text x="365" y="125" fill="#a8e6c2" text-anchor="middle" font-size="10">clean append, dense, sequential I/O</text>
  <text x="470" y="115" fill="#7ee2a8" font-size="11">→ no split ✓</text>

  <!-- random insert (split) -->
  <text x="40" y="178" fill="#ff7b72" font-size="13" font-weight="600">✗ RANDOM PK (UUIDv4) — key lands in the MIDDLE of a full page</text>
  <rect x="40" y="190" width="190" height="50" rx="5" fill="#3a1a1a" stroke="#da3633"/>
  <text x="135" y="210" fill="#f5c2c0" text-anchor="middle" font-size="11">full page: a7·c3·f1</text>
  <text x="135" y="228" fill="#ff9b95" text-anchor="middle" font-size="10">insert "b9" must go between a7 and c3</text>
  <path d="M235,215 L285,215" stroke="#d29922" stroke-width="2.5" fill="none" marker-end="url(#a15)"/>
  <text x="260" y="206" fill="#f0c674" text-anchor="middle" font-size="10">SPLIT</text>

  <rect x="290" y="180" width="150" height="34" rx="5" fill="#3a2a14" stroke="#d29922"/>
  <text x="365" y="202" fill="#f5e6c7" text-anchor="middle" font-size="11">page A: a7·b9  (½ full)</text>
  <rect x="290" y="222" width="150" height="34" rx="5" fill="#3a2a14" stroke="#d29922"/>
  <text x="365" y="244" fill="#f5e6c7" text-anchor="middle" font-size="11">page B: c3·f1  (½ full)</text>
  <text x="455" y="206" fill="#ff7b72" font-size="11">→ fragmentation:</text>
  <text x="455" y="224" fill="#f5c2c0" font-size="10">wasted space · fewer rows/page</text>
  <text x="455" y="240" fill="#f5c2c0" font-size="10">worse cache · extra random I/O</text>

  <!-- write amplification -->
  <text x="40" y="290" fill="#58a6ff" font-size="13" font-weight="600">WRITE AMPLIFICATION — one INSERT maintains every index</text>
  <rect x="40" y="300" width="120" height="40" rx="6" fill="#1f6feb" stroke="#58a6ff"/>
  <text x="100" y="324" fill="#fff" text-anchor="middle" font-size="12">1 INSERT</text>
  <g stroke="#58a6ff" stroke-width="1.5" fill="none">
    <path d="M160,320 L210,308"/><path d="M160,320 L210,320"/><path d="M160,320 L210,332"/>
    <path d="M160,320 L210,344"/>
  </g>
  <rect x="215" y="300" width="135" height="20" rx="4" fill="#13361f" stroke="#2ea043"/><text x="282" y="315" fill="#7ee2a8" text-anchor="middle" font-size="10">clustered (PK) B+Tree</text>
  <rect x="215" y="324" width="135" height="20" rx="4" fill="#1f1838" stroke="#6e40c9"/><text x="282" y="339" fill="#d2a8ff" text-anchor="middle" font-size="10">secondary idx 1</text>
  <rect x="215" y="348" width="135" height="20" rx="4" fill="#1f1838" stroke="#6e40c9"/><text x="282" y="363" fill="#d2a8ff" text-anchor="middle" font-size="10">secondary idx 2 … N</text>
  <text x="380" y="334" fill="#f0c674" font-size="12">N indexes  →  ~N+1 B+Tree maintenance ops per write</text>
  <text x="380" y="352" fill="#8b98a5" font-size="11">more indexes = faster reads, but slower writes + more storage + buffer-pool pressure</text>

  <defs><marker id="a15" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#d29922"/></marker></defs>

  <rect x="40" y="386" width="680" height="28" rx="5" fill="#11161c" stroke="#30363d"/>
  <text x="380" y="404" fill="#f0c674" text-anchor="middle" font-size="11">FIX: compact monotonic/time-ordered keys (M03/3.12) + minimal index set (5.16) → ledger sustains high write throughput for years</text>
</svg>
