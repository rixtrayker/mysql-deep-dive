<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="760" height="380" fill="#0f1419"/>
  <text x="380" y="28" fill="#e6edf3" font-size="17" font-weight="700" text-anchor="middle">5.4 · Clustered index — the table IS the PK B+Tree</text>
  <text x="380" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">leaves hold the FULL ROW · PK lookup returns the row directly (no second hop)</text>

  <!-- root -->
  <rect x="310" y="72" width="140" height="36" rx="6" fill="#1f6feb" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="380" y="95" fill="#fff" text-anchor="middle" font-size="12">PK index root</text>

  <!-- internal -->
  <rect x="170" y="150" width="160" height="34" rx="6" fill="#1b3a5c" stroke="#2f6db5" stroke-width="1.3"/>
  <text x="250" y="172" fill="#cde3ff" text-anchor="middle" font-size="11">account_id &lt; 50</text>
  <rect x="430" y="150" width="160" height="34" rx="6" fill="#1b3a5c" stroke="#2f6db5" stroke-width="1.3"/>
  <text x="510" y="172" fill="#cde3ff" text-anchor="middle" font-size="11">account_id ≥ 50</text>
  <path d="M350,108 L250,150" stroke="#58a6ff" stroke-width="1.3" fill="none"/>
  <path d="M410,108 L510,150" stroke="#58a6ff" stroke-width="1.3" fill="none"/>

  <!-- leaf pages contain full rows -->
  <rect x="60" y="225" width="290" height="115" rx="8" fill="#143a2a" stroke="#2ea043" stroke-width="1.5"/>
  <text x="205" y="245" fill="#7ee2a8" text-anchor="middle" font-size="12" font-weight="600">LEAF = FULL ROWS (sorted by PK)</text>
  <text x="75" y="268" fill="#c7f5d9" font-size="11">PK 42 │ amount=-100.00 │ ccy=USD │ ts=… │ status</text>
  <text x="75" y="288" fill="#c7f5d9" font-size="11">PK 43 │ amount=+ 80.00 │ ccy=USD │ ts=… │ status</text>
  <text x="75" y="308" fill="#c7f5d9" font-size="11">PK 47 │ amount=- 30.00 │ ccy=EUR │ ts=… │ status</text>
  <text x="205" y="330" fill="#7ee2a8" text-anchor="middle" font-size="10.5">the row lives HERE — PK is its physical address</text>

  <rect x="410" y="225" width="290" height="115" rx="8" fill="#143a2a" stroke="#2ea043" stroke-width="1.5"/>
  <text x="555" y="245" fill="#7ee2a8" text-anchor="middle" font-size="12" font-weight="600">next leaf (rows continue in PK order)</text>
  <text x="425" y="268" fill="#c7f5d9" font-size="11">PK 50 │ … full row … </text>
  <text x="425" y="288" fill="#c7f5d9" font-size="11">PK 51 │ … full row … </text>
  <text x="425" y="308" fill="#c7f5d9" font-size="11">PK 58 │ … full row … </text>
  <text x="555" y="330" fill="#7ee2a8" text-anchor="middle" font-size="10.5">adjacent PKs = adjacent on disk → range scans sequential</text>

  <path d="M250,184 L205,225" stroke="#2f6db5" stroke-width="1.2" fill="none"/>
  <path d="M510,184 L555,225" stroke="#2f6db5" stroke-width="1.2" fill="none"/>

  <!-- callout -->
  <rect x="60" y="352" width="640" height="22" rx="4" fill="#11161c" stroke="#30363d"/>
  <text x="380" y="367" fill="#f0c674" text-anchor="middle" font-size="11">PK choice = physical layout (M01/1.3) · monotonic PK appends cleanly · random PK splits pages (5.15) · PK embedded in every secondary index (5.5)</text>
</svg>
