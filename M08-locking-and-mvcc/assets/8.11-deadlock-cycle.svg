<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="430" fill="#0f1419"/>
  <text x="400" y="30" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">8.11 · Deadlock — cycle of waits, and the consistent-ordering fix</text>
  <text x="400" y="50" fill="#8b98a5" font-size="12" text-anchor="middle">two transfers lock accounts in OPPOSITE order → a cycle neither can escape · InnoDB detects + kills a victim</text>

  <!-- THE DEADLOCK (left) -->
  <text x="200" y="86" fill="#ff7b72" font-size="13" font-weight="700" text-anchor="middle">✗ THE DEADLOCK</text>
  <text x="200" y="104" fill="#f5c2c0" font-size="10.5" text-anchor="middle">T1: transfer A→B · T2: transfer B→A</text>

  <!-- T1 holds A wants B -->
  <rect x="60" y="120" width="120" height="44" rx="6" fill="#1b3a5c" stroke="#2f6db5"/>
  <text x="120" y="140" fill="#cde3ff" font-size="11" text-anchor="middle">T1 holds 🔒 acct A</text>
  <text x="120" y="156" fill="#9fd0ff" font-size="10" text-anchor="middle">wants acct B</text>
  <rect x="220" y="120" width="120" height="44" rx="6" fill="#2d2150" stroke="#8957e5"/>
  <text x="280" y="140" fill="#e7d6ff" font-size="11" text-anchor="middle">T2 holds 🔒 acct B</text>
  <text x="280" y="156" fill="#cdb4ff" font-size="10" text-anchor="middle">wants acct A</text>

  <!-- cycle arrows -->
  <path d="M180,134 L218,134" stroke="#da3633" stroke-width="2" fill="none" marker-end="url(#r)"/>
  <text x="200" y="128" fill="#ff7b72" font-size="9" text-anchor="middle">waits-for</text>
  <path d="M220,152 L182,152" stroke="#da3633" stroke-width="2" fill="none" marker-end="url(#r)"/>
  <defs><marker id="r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#da3633"/></marker></defs>
  <text x="200" y="190" fill="#ff7b72" font-size="11" text-anchor="middle" font-weight="600">CYCLE → neither proceeds, ever</text>

  <rect x="60" y="205" width="280" height="58" rx="6" fill="#3a1a1a" stroke="#da3633"/>
  <text x="200" y="226" fill="#ff7b72" font-size="11.5" font-weight="600" text-anchor="middle">InnoDB DETECTS (waits-for graph)</text>
  <text x="200" y="246" fill="#f5c2c0" font-size="10.5" text-anchor="middle">→ kills VICTIM (fewest rows changed) → err 1213</text>
  <text x="200" y="259" fill="#f5c2c0" font-size="10" text-anchor="middle">→ app RETRIES the victim</text>

  <!-- THE FIX (right) -->
  <text x="600" y="86" fill="#7ee2a8" font-size="13" font-weight="700" text-anchor="middle">✓ THE FIX — consistent lock order</text>
  <text x="600" y="104" fill="#a8e6c2" font-size="10.5" text-anchor="middle">ALWAYS lock lower account_id first (both transfers)</text>

  <rect x="460" y="120" width="120" height="44" rx="6" fill="#143a2a" stroke="#2ea043"/>
  <text x="520" y="140" fill="#7ee2a8" font-size="11" text-anchor="middle">T1 locks A then B</text>
  <text x="520" y="156" fill="#a8e6c2" font-size="10" text-anchor="middle">(A &lt; B)</text>
  <rect x="620" y="120" width="120" height="44" rx="6" fill="#143a2a" stroke="#2ea043"/>
  <text x="680" y="140" fill="#7ee2a8" font-size="11" text-anchor="middle">T2 locks A then B</text>
  <text x="680" y="156" fill="#a8e6c2" font-size="10" text-anchor="middle">(same order!)</text>

  <path d="M520,164 L520,205" stroke="#2ea043" stroke-width="2" fill="none" marker-end="url(#g)"/>
  <path d="M680,164 L680,205" stroke="#2ea043" stroke-width="2" fill="none" marker-end="url(#g)"/>
  <defs><marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2ea043"/></marker></defs>

  <rect x="460" y="205" width="280" height="58" rx="6" fill="#13361f" stroke="#2ea043"/>
  <text x="600" y="226" fill="#7ee2a8" font-size="11.5" font-weight="600" text-anchor="middle">both want A first → one waits for the other</text>
  <text x="600" y="246" fill="#a8e6c2" font-size="10.5" text-anchor="middle">NO CYCLE possible → no deadlock</text>
  <text x="600" y="259" fill="#a8e6c2" font-size="10" text-anchor="middle">one finishes, the other proceeds ✓</text>

  <!-- avoidance summary -->
  <rect x="60" y="290" width="680" height="100" rx="8" fill="#11161c" stroke="#30363d"/>
  <text x="400" y="312" fill="#e6edf3" font-size="12.5" font-weight="700" text-anchor="middle">deadlock strategy: AVOID + DETECT + RETRY</text>
  <text x="75" y="334" fill="#7ee2a8" font-size="11">1 · AVOID — acquire locks in a consistent GLOBAL order (e.g. ascending account_id) → no cycle can form</text>
  <text x="75" y="354" fill="#9fd0ff" font-size="11">2 · keep txns SHORT (8.10) · index predicates (8.8) · RC instead of RR → fewer gap-lock deadlocks (8.7/8.14)</text>
  <text x="75" y="374" fill="#f0c674" font-size="11">3 · DETECT (InnoDB, automatic) + RETRY on error 1213 — the standard money-code pattern (M07/7.7)</text>
</svg>
