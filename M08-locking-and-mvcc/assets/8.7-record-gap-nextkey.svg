<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="430" fill="#0f1419"/>
  <text x="400" y="30" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">8.7 · Record · gap · next-key locks — how InnoDB prevents phantoms</text>
  <text x="400" y="50" fill="#8b98a5" font-size="12" text-anchor="middle">InnoDB locks positions in an INDEX: existing records, the GAPS between them, or both (next-key)</text>

  <!-- index line with records -->
  <text x="60" y="92" fill="#8b98a5" font-size="11">index on account_id →</text>
  <line x1="60" y1="120" x2="740" y2="120" stroke="#30363d" stroke-width="2"/>
  <g font-size="12" text-anchor="middle">
    <circle cx="140" cy="120" r="22" fill="#1b3a5c" stroke="#2f6db5" stroke-width="1.5"/><text x="140" y="125" fill="#cde3ff">40</text>
    <circle cx="320" cy="120" r="22" fill="#1b3a5c" stroke="#2f6db5" stroke-width="1.5"/><text x="320" y="125" fill="#cde3ff">45</text>
    <circle cx="500" cy="120" r="22" fill="#1b3a5c" stroke="#2f6db5" stroke-width="1.5"/><text x="500" y="125" fill="#cde3ff">50</text>
    <circle cx="680" cy="120" r="22" fill="#1b3a5c" stroke="#2f6db5" stroke-width="1.5"/><text x="680" y="125" fill="#cde3ff">55</text>
  </g>
  <text x="230" y="155" fill="#8b98a5" font-size="10">gap (40,45)</text>
  <text x="410" y="155" fill="#8b98a5" font-size="10">gap (45,50)</text>

  <!-- RECORD lock -->
  <rect x="40" y="180" width="720" height="58" rx="8" fill="#143a2a" stroke="#2ea043" stroke-width="1.4"/>
  <text x="55" y="200" fill="#7ee2a8" font-size="12.5" font-weight="700">RECORD lock — locks ONE existing record</text>
  <text x="55" y="220" fill="#a8e6c2" font-size="11">e.g. WHERE account_id = 45 (unique) → locks just record 45 · prevents MODIFY of 45 · allows inserts in gaps</text>
  <circle cx="690" cy="209" r="16" fill="#13361f" stroke="#2ea043" stroke-width="2"/><text x="690" y="214" fill="#7ee2a8" font-size="11" text-anchor="middle">45🔒</text>

  <!-- GAP lock -->
  <rect x="40" y="246" width="720" height="58" rx="8" fill="#3a2a14" stroke="#d29922" stroke-width="1.4"/>
  <text x="55" y="266" fill="#f0c674" font-size="12.5" font-weight="700">GAP lock — locks the EMPTY SPACE between records</text>
  <text x="55" y="286" fill="#f5e6c7" font-size="11">locks NO existing row — blocks INSERT into the gap (e.g. no new account_id 41–44) · gap locks don't conflict with each other</text>
  <rect x="640" y="252" width="110" height="22" rx="4" fill="#3a2a14" stroke="#d29922" stroke-dasharray="4 3"/><text x="695" y="268" fill="#f0c674" font-size="10" text-anchor="middle">gap🔒 (no insert)</text>

  <!-- NEXT-KEY lock -->
  <rect x="40" y="312" width="720" height="74" rx="8" fill="#2d1a3a" stroke="#8957e5" stroke-width="1.6"/>
  <text x="55" y="332" fill="#d2a8ff" font-size="12.5" font-weight="700">NEXT-KEY lock = record + gap-before (the REPEATABLE READ default)</text>
  <text x="55" y="352" fill="#e7d6ff" font-size="11">range FOR UPDATE WHERE account_id BETWEEN 40 AND 50 → next-key locks the records AND the gaps</text>
  <text x="55" y="370" fill="#7ee2a8" font-size="11.5" font-weight="600">→ blocks INSERT of a new account_id 41–49 = PHANTOM PREVENTION (M07/7.13b)</text>
  <text x="640" y="352" fill="#ff7b72" font-size="10">⚠ more locking</text>
  <text x="640" y="368" fill="#f5c2c0" font-size="10">→ deadlocks (8.11)</text>

  <text x="400" y="412" fill="#f0c674" font-size="11" text-anchor="middle">READ COMMITTED disables gap locks (record-only) → phantoms possible, fewer deadlocks, more concurrency (8.14)</text>
</svg>
