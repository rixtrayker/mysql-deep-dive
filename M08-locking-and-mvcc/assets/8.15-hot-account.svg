<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="450" fill="#0f1419"/>
  <text x="400" y="30" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">8.15 · Hot-account contention — the fintech concurrency bottleneck</text>
  <text x="400" y="50" fill="#8b98a5" font-size="12" text-anchor="middle">many transfers all lock ONE balance row → serialize → throughput capped, regardless of hardware</text>

  <!-- the problem: queue on one row -->
  <text x="200" y="84" fill="#ff7b72" font-size="13" font-weight="700" text-anchor="middle">✗ THE PROBLEM</text>
  <g font-size="11" text-anchor="middle">
    <rect x="40" y="98" width="70" height="32" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="75" y="118" fill="#cde3ff">txn 1</text>
    <rect x="40" y="136" width="70" height="32" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="75" y="156" fill="#cde3ff">txn 2 ⏳</text>
    <rect x="40" y="174" width="70" height="32" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="75" y="194" fill="#cde3ff">txn 3 ⏳</text>
    <rect x="40" y="212" width="70" height="32" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="75" y="232" fill="#cde3ff">txn N ⏳</text>
  </g>
  <path d="M110,114 L180,154" stroke="#da3633" stroke-width="1.5" fill="none"/>
  <path d="M110,152 L180,158" stroke="#da3633" stroke-width="1.5" fill="none"/>
  <path d="M110,190 L180,162" stroke="#da3633" stroke-width="1.5" fill="none"/>
  <path d="M110,228 L180,166" stroke="#da3633" stroke-width="1.5" fill="none"/>
  <rect x="185" y="138" width="150" height="44" rx="6" fill="#3a1a1a" stroke="#da3633" stroke-width="2"/>
  <text x="260" y="158" fill="#ff7b72" font-size="11.5" font-weight="700" text-anchor="middle">🔒 hot account</text>
  <text x="260" y="174" fill="#f5c2c0" font-size="10" text-anchor="middle">balance row (one X lock)</text>
  <text x="200" y="262" fill="#ff7b72" font-size="11" text-anchor="middle" font-weight="600">throughput = 1 / lock-hold-time</text>
  <text x="200" y="280" fill="#f5c2c0" font-size="10" text-anchor="middle">(held to commit, 8.10) — more cores don't help</text>

  <!-- the mitigations -->
  <text x="600" y="84" fill="#7ee2a8" font-size="13" font-weight="700" text-anchor="middle">✓ MITIGATIONS</text>
  <rect x="420" y="96" width="360" height="40" rx="6" fill="#143a2a" stroke="#2ea043"/>
  <text x="435" y="113" fill="#7ee2a8" font-size="11" font-weight="600">1 · SHORT txn + ATOMIC update (M07/7.11/7.15)</text>
  <text x="435" y="129" fill="#a8e6c2" font-size="10">balance = balance + :delta · no external call inside · minimal lock-hold</text>

  <rect x="420" y="142" width="360" height="48" rx="6" fill="#143a2a" stroke="#2ea043"/>
  <text x="435" y="159" fill="#7ee2a8" font-size="11" font-weight="600">2 · SHARD the counter</text>
  <text x="435" y="175" fill="#a8e6c2" font-size="10">split balance into N sub-rows → transfers hash to different rows</text>
  <text x="435" y="187" fill="#a8e6c2" font-size="10">→ contention spread across N locks · true balance = SUM (reconcile)</text>

  <rect x="420" y="196" width="360" height="48" rx="6" fill="#143a2a" stroke="#2ea043"/>
  <text x="435" y="213" fill="#7ee2a8" font-size="11" font-weight="600">3 · APPEND-ONLY ledger + ASYNC/batched balance (M02/2.17)</text>
  <text x="435" y="229" fill="#a8e6c2" font-size="10">entries APPEND (different rows → no hot-row contention, 8.9)</text>
  <text x="435" y="241" fill="#a8e6c2" font-size="10">balance updated in batch / via queue (SKIP LOCKED, 8.12) — off the hot path</text>

  <!-- principle -->
  <rect x="40" y="310" width="740" height="118" rx="8" fill="#11161c" stroke="#30363d"/>
  <text x="400" y="332" fill="#e6edf3" font-size="12.5" font-weight="700" text-anchor="middle">principle: a single shared mutable location is a serialization ceiling</text>
  <text x="60" y="356" fill="#9fd0ff" font-size="11">● row-level locking gives great concurrency ACROSS accounts — only the SAME hot account serializes (8.5)</text>
  <text x="60" y="378" fill="#7ee2a8" font-size="11">● relieve a hot-spot by: SPREADING it (shard the counter), REMOVING it from the hot path (append + async), or SHORTENING the critical section</text>
  <text x="60" y="400" fill="#f0c674" font-size="11">● same as a contended cache line / global mutex / hot partition key — universal hot-spot pattern → sets up M16 (payments at scale)</text>
  <text x="60" y="420" fill="#8b98a5" font-size="10.5">tradeoff: synchronous single-balance = simplest + strongly consistent; sharded/async = scalable but balance is a reconciled projection (M02/2.17)</text>
</svg>
