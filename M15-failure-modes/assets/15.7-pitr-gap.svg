<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="360" fill="#0f1419"/>
  <text x="400" y="26" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">15.7 · PITR gap — the recovery you counted on has a HOLE</text>
  <text x="400" y="46" fill="#8b98a5" font-size="12" text-anchor="middle">PITR (M13/13.3) needs the binlog RETAINED + DURABLE — a gap means that window is gone forever</text>

  <!-- timeline -->
  <line x1="60" y1="120" x2="740" y2="120" stroke="#30363d" stroke-width="2"/>
  <circle cx="120" cy="120" r="8" fill="#13361f" stroke="#2ea043"/><text x="120" y="100" fill="#7ee2a8" font-size="9" text-anchor="middle">base backup</text>
  <rect x="128" y="108" width="160" height="24" rx="4" fill="#1b3a5c" stroke="#2f6db5"/><text x="208" y="125" fill="#cde3ff" font-size="9" text-anchor="middle">binlog OK (replayable)</text>
  <rect x="290" y="108" width="150" height="24" rx="4" fill="#3a1410" stroke="#da3633"/><text x="365" y="125" fill="#ff7b72" font-size="9" text-anchor="middle">GAP (missing/corrupt)</text>
  <rect x="442" y="108" width="160" height="24" rx="4" fill="#1b3a5c" stroke="#2f6db5"/><text x="522" y="125" fill="#cde3ff" font-size="9" text-anchor="middle">binlog OK</text>
  <circle cx="650" cy="120" r="9" fill="#3a1410" stroke="#da3633" stroke-width="2"/><text x="650" y="100" fill="#ff7b72" font-size="9" text-anchor="middle">⚡ disaster</text>

  <text x="365" y="158" fill="#ff7b72" font-size="10" text-anchor="middle">↑ can only restore to HERE (before the gap) → lose everything since</text>

  <!-- causes -->
  <rect x="20" y="172" width="370" height="92" rx="9" fill="#11161c" stroke="#da3633" stroke-width="1.4"/>
  <text x="205" y="192" fill="#ff7b72" font-size="11" font-weight="700" text-anchor="middle">HOW THE GAP HAPPENS</text>
  <text x="35" y="211" fill="#f5b7b3" font-size="9">retention too short → binlogs purged before the window</text>
  <text x="35" y="227" fill="#f5b7b3" font-size="9">sync_binlog=0 → crash lost recent binlog events (15.2)</text>
  <text x="35" y="243" fill="#f5b7b3" font-size="9">corrupt binlog file (15.5) breaks replay</text>
  <text x="35" y="259" fill="#f5b7b3" font-size="9">no base backup in the binlog's range</text>

  <rect x="410" y="172" width="370" height="92" rx="9" fill="#0d1b12" stroke="#2ea043" stroke-width="1.5"/>
  <text x="595" y="192" fill="#7ee2a8" font-size="11" font-weight="700" text-anchor="middle">PREVENTION</text>
  <text x="425" y="211" fill="#a8e6c2" font-size="9">sync_binlog=1 (durable, no crash gap — the money setting)</text>
  <text x="425" y="227" fill="#a8e6c2" font-size="9">retention ≥ the recovery window + archive OFF-HOST</text>
  <text x="425" y="243" fill="#a8e6c2" font-size="9">frequent base backups (short replay distance)</text>
  <text x="425" y="259" fill="#7ee2a8" font-size="9">TESTED PITR DRILLS (M13/13.5 — reveal the gap BEFORE disaster)</text>

  <rect x="20" y="274" width="760" height="72" rx="10" fill="#11161c" stroke="#1f6feb" stroke-width="1.3"/>
  <text x="400" y="296" fill="#9fd0ff" font-size="11" font-weight="700" text-anchor="middle">💰 VERDICT: money UNRECOVERABLE in the gap (coarse restore loses the window) — a RECOVERY catastrophe</text>
  <text x="400" y="318" fill="#cde3ff" font-size="9.5" text-anchor="middle">the binlog's DURABILITY (M09) + RETENTION (M13) directly gate RECOVERABILITY · a tested drill reveals the gap; reconciliation finds what's lost</text>
  <text x="400" y="338" fill="#8b98a5" font-size="9.5" text-anchor="middle">"a PITR gap is the recovery you didn't have — make the binlog durable + retained, and TEST the replay"</text>
</svg>
