<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 410" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="410" fill="#0f1419"/>
  <text x="400" y="26" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">15.9 · The lost-update race — the DB is correct, the APP is wrong</text>
  <text x="400" y="46" fill="#8b98a5" font-size="12" text-anchor="middle">read-modify-write without protection → two transfers overwrite each other · invisible to DB integrity checks</text>

  <!-- the race -->
  <text x="150" y="78" fill="#9fd0ff" font-size="11" font-weight="700" text-anchor="middle">Transfer X (debit $80)</text>
  <text x="650" y="78" fill="#d2a8ff" font-size="11" font-weight="700" text-anchor="middle">Transfer Y (debit $80)</text>
  <line x1="400" y1="88" x2="400" y2="290" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4 3"/>

  <rect x="40" y="92" width="320" height="30" rx="5" fill="#1b3a5c" stroke="#2f6db5"/>
  <text x="200" y="111" fill="#cde3ff" font-size="9.5" text-anchor="middle">① SELECT balance → reads $100</text>
  <rect x="440" y="100" width="320" height="30" rx="5" fill="#2d2150" stroke="#8957e5"/>
  <text x="600" y="119" fill="#e7d6ff" font-size="9.5" text-anchor="middle">② SELECT balance → ALSO reads $100</text>

  <rect x="40" y="140" width="320" height="30" rx="5" fill="#1b3a5c" stroke="#2f6db5"/>
  <text x="200" y="159" fill="#cde3ff" font-size="9.5" text-anchor="middle">③ compute 100 − 80 = 20</text>
  <rect x="440" y="148" width="320" height="30" rx="5" fill="#2d2150" stroke="#8957e5"/>
  <text x="600" y="167" fill="#e7d6ff" font-size="9.5" text-anchor="middle">④ compute 100 − 80 = 20</text>

  <rect x="40" y="188" width="320" height="30" rx="5" fill="#13361f" stroke="#2ea043"/>
  <text x="200" y="207" fill="#a8e6c2" font-size="9.5" text-anchor="middle">⑤ UPDATE balance = 20 ✓ commits</text>
  <rect x="440" y="196" width="320" height="30" rx="5" fill="#3a1410" stroke="#da3633"/>
  <text x="600" y="215" fill="#f5b7b3" font-size="9.5" text-anchor="middle">⑥ UPDATE balance = 20 ✓ OVERWRITES X!</text>

  <rect x="120" y="236" width="560" height="44" rx="8" fill="#3a1410" stroke="#da3633" stroke-width="1.6"/>
  <text x="400" y="256" fill="#ff7b72" font-size="11.5" font-weight="700" text-anchor="middle">result: balance = $20 after TWO $80 debits (should be -$60, i.e. one REJECTED)</text>
  <text x="400" y="273" fill="#f5b7b3" font-size="9.5" text-anchor="middle">X's update is LOST · the DB persisted both writes faithfully · the APP lost an update — invisible to CHECK TABLE / checksums</text>

  <!-- the fix -->
  <rect x="20" y="292" width="375" height="74" rx="9" fill="#0d1b12" stroke="#2ea043" stroke-width="1.5"/>
  <text x="207" y="312" fill="#7ee2a8" font-size="11" font-weight="700" text-anchor="middle">PREVENTION (make it concurrency-safe)</text>
  <text x="207" y="330" fill="#a8e6c2" font-size="8.5" text-anchor="middle">atomic conditional: UPDATE … SET balance=balance-:amt</text>
  <text x="207" y="343" fill="#a8e6c2" font-size="8.5" text-anchor="middle">WHERE balance &gt;= :amt (no read-then-write gap, M07/7.16)</text>
  <text x="207" y="358" fill="#a8e6c2" font-size="8.5" text-anchor="middle">OR SELECT … FOR UPDATE (M08) OR optimistic version column</text>

  <rect x="405" y="292" width="375" height="74" rx="9" fill="#11161c" stroke="#8957e5" stroke-width="1.3"/>
  <text x="592" y="312" fill="#d2a8ff" font-size="11" font-weight="700" text-anchor="middle">DETECTION + RECOVERY</text>
  <text x="592" y="330" fill="#e7d6ff" font-size="8.5" text-anchor="middle">reconcile (M12/12.14): balance ≠ Σ entries → reveals it</text>
  <text x="592" y="343" fill="#e7d6ff" font-size="8.5" text-anchor="middle">recover: re-derive from the IMMUTABLE ledger (M01/1.17)</text>
  <text x="592" y="358" fill="#e7d6ff" font-size="8.5" text-anchor="middle">the entries are truth; the derived balance can be wrong</text>

  <rect x="20" y="374" width="760" height="32" rx="8" fill="#0d1b12" stroke="#2ea043" stroke-width="1.2"/>
  <text x="400" y="394" fill="#7ee2a8" font-size="10.5" font-weight="700" text-anchor="middle">💰 VERDICT: money LOST by the app — the DB can't save you from app races; use atomic ops + idempotency, reconcile against the immutable ledger</text>
</svg>
