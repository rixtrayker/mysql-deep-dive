<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="430" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">12.6 · Two-phase commit — atomic across nodes, but blocks if the coordinator dies</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">prepare (vote, hold locks) → commit/abort · the gap between promise and decision is the danger</text>

  <!-- coordinator -->
  <rect x="330" y="66" width="140" height="36" rx="7" fill="#3a2e0a" stroke="#d29922" stroke-width="1.5"/>
  <text x="400" y="89" fill="#f0c674" font-size="11" font-weight="700" text-anchor="middle">COORDINATOR</text>

  <!-- participants -->
  <rect x="120" y="150" width="150" height="36" rx="6" fill="#13361f" stroke="#2ea043"/><text x="195" y="173" fill="#7ee2a8" font-size="10" text-anchor="middle">shard 1 (debit A)</text>
  <rect x="530" y="150" width="150" height="36" rx="6" fill="#13361f" stroke="#2ea043"/><text x="605" y="173" fill="#7ee2a8" font-size="10" text-anchor="middle">shard 2 (credit B)</text>

  <!-- phase 1 -->
  <text x="400" y="128" fill="#9fd0ff" font-size="11" font-weight="700" text-anchor="middle">PHASE 1 — prepare / vote</text>
  <path d="M350 100 L210 148" stroke="#58a6ff" stroke-width="1.3" marker-end="url(#b)"/>
  <path d="M450 100 L590 148" stroke="#58a6ff" stroke-width="1.3" marker-end="url(#b)"/>
  <text x="250" y="124" fill="#9fd0ff" font-size="8.5">"prepare?"</text>
  <text x="520" y="124" fill="#9fd0ff" font-size="8.5">"prepare?"</text>
  <path d="M205 188 L350 210" stroke="#2ea043" stroke-width="1.2" marker-end="url(#g)"/>
  <path d="M595 188 L450 210" stroke="#2ea043" stroke-width="1.2" marker-end="url(#g)"/>
  <text x="250" y="206" fill="#7ee2a8" font-size="8.5">"YES" (locks held)</text>
  <text x="510" y="206" fill="#7ee2a8" font-size="8.5">"YES" (locks held)</text>

  <!-- phase 2 -->
  <text x="400" y="238" fill="#7ee2a8" font-size="11" font-weight="700" text-anchor="middle">PHASE 2 — all voted yes → COMMIT both</text>
  <rect x="330" y="248" width="140" height="30" rx="6" fill="#13361f" stroke="#2ea043"/><text x="400" y="267" fill="#7ee2a8" font-size="9.5" text-anchor="middle">✓ atomic across nodes</text>

  <!-- the killer -->
  <rect x="60" y="296" width="680" height="92" rx="10" fill="#11161c" stroke="#da3633" stroke-width="1.8"/>
  <text x="400" y="318" fill="#ff7b72" font-size="12.5" font-weight="700" text-anchor="middle">⚠ THE KILLER — coordinator crashes AFTER prepare, BEFORE the decision</text>
  <text x="400" y="340" fill="#f5b7b3" font-size="10" text-anchor="middle">both shards voted YES (can't abort) but never heard commit/abort (can't proceed)</text>
  <text x="400" y="358" fill="#ff7b72" font-size="11" font-weight="700" text-anchor="middle">→ IN-DOUBT: blocked, holding locks on the account balances (M08), indefinitely</text>
  <text x="400" y="378" fill="#f5b7b3" font-size="9.5" text-anchor="middle">blocking on coordinator failure = 2PC's fundamental weakness → for money, use a Saga (12.8); avoid XA (12.7)</text>

  <text x="400" y="410" fill="#8b98a5" font-size="10" text-anchor="middle">fintech preference: AVOID (co-locate, M11/11.9) &gt; Saga (12.8) &gt; 2PC. MySQL's robust 2PC is the INTERNAL binlog-redo one (M09/9.11)</text>

  <defs>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/></marker>
    <marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2ea043"/></marker>
  </defs>
</svg>
