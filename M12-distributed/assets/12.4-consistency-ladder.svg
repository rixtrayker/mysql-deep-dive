<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="440" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">12.4 · The consistency spectrum — pick the weakest level that's still correct</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">stronger = more coordination = more latency + less availability · weaker = cheaper + more available</text>

  <!-- axis -->
  <text x="60" y="92" fill="#ff7b72" font-size="10" font-weight="700">STRONGER ↑ (costly, slow, CP)</text>
  <text x="60" y="412" fill="#7ee2a8" font-size="10" font-weight="700">WEAKER ↓ (cheap, fast, AP)</text>

  <!-- linearizable -->
  <rect x="200" y="74" width="420" height="62" rx="9" fill="#11161c" stroke="#da3633" stroke-width="1.6"/>
  <text x="410" y="96" fill="#ff7b72" font-size="12.5" font-weight="700" text-anchor="middle">LINEARIZABLE / STRONG</text>
  <text x="410" y="114" fill="#f5b7b3" font-size="9.5" text-anchor="middle">acts like ONE copy — every read sees the latest write, real-time order</text>
  <text x="410" y="130" fill="#a8e6c2" font-size="9.5" text-anchor="middle">money: balance-for-AUTHORIZATION (read primary) — any staleness = double-spend</text>

  <!-- causal -->
  <rect x="200" y="146" width="420" height="58" rx="9" fill="#11161c" stroke="#d29922" stroke-width="1.4"/>
  <text x="410" y="167" fill="#f0c674" font-size="12" font-weight="700" text-anchor="middle">CAUSAL / SEQUENTIAL</text>
  <text x="410" y="184" fill="#f5e6c7" font-size="9.5" text-anchor="middle">cause→effect order preserved; unrelated ops may differ across nodes</text>
  <text x="410" y="199" fill="#8b98a5" font-size="9" text-anchor="middle">cheaper than strong, stronger than eventual</text>

  <!-- RYW -->
  <rect x="200" y="214" width="420" height="58" rx="9" fill="#11161c" stroke="#1f6feb" stroke-width="1.4"/>
  <text x="410" y="235" fill="#9fd0ff" font-size="12" font-weight="700" text-anchor="middle">READ-YOUR-WRITES / MONOTONIC (session)</text>
  <text x="410" y="252" fill="#cde3ff" font-size="9.5" text-anchor="middle">you always see your OWN writes, never go backward in time</text>
  <text x="410" y="267" fill="#a8e6c2" font-size="9.5" text-anchor="middle">money: your own txn history after paying (GTID-wait, M10/10.6)</text>

  <!-- eventual -->
  <rect x="200" y="282" width="420" height="62" rx="9" fill="#11161c" stroke="#2ea043" stroke-width="1.6"/>
  <text x="410" y="304" fill="#7ee2a8" font-size="12.5" font-weight="700" text-anchor="middle">EVENTUAL</text>
  <text x="410" y="322" fill="#a8e6c2" font-size="9.5" text-anchor="middle">replicas converge SOMEDAY — no recency/order guarantee meanwhile</text>
  <text x="410" y="338" fill="#a8e6c2" font-size="9.5" text-anchor="middle">money: reports / display (async replica, M10/10.5) — staleness harmless</text>

  <!-- arrow -->
  <path d="M120 100 L120 386" stroke="#8b98a5" stroke-width="2" marker-end="url(#dn)"/>
  <path d="M120 386 L120 100" stroke="#8b98a5" stroke-width="0.5"/>

  <text x="400" y="372" fill="#f0c674" font-size="11.5" font-weight="700" text-anchor="middle">the skill: weakest-correct level PER operation (12.15) — strong where money moves, eventual elsewhere</text>
  <text x="400" y="398" fill="#8b98a5" font-size="10" text-anchor="middle">for money, eventual is safe ONLY with idempotency (12.9) + reconciliation (12.14)</text>
  <text x="400" y="420" fill="#8b98a5" font-size="10" text-anchor="middle">MySQL: compose the level from read-routing (primary/RYW/replica) + sync-mode (M10/10.4)</text>

  <defs><marker id="dn" markerWidth="9" markerHeight="9" refX="4" refY="7" orient="auto"><path d="M0,0 L8,0 L4,7 Z" fill="#8b98a5"/></marker></defs>
</svg>
