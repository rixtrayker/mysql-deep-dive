<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="400" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">12.9 · Idempotency — the load-bearing primitive of distributed money</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">same key → first time applies, retries return the recorded result (dedup) · at-least-once delivery → exactly-once EFFECT</text>

  <!-- client -->
  <rect x="40" y="78" width="150" height="74" rx="8" fill="#1b3a5c" stroke="#2f6db5"/>
  <text x="115" y="100" fill="#cde3ff" font-size="10.5" font-weight="700" text-anchor="middle">CLIENT</text>
  <text x="115" y="120" fill="#9fd0ff" font-size="9" text-anchor="middle">pay $100, key = K7</text>
  <text x="115" y="136" fill="#9fd0ff" font-size="9" text-anchor="middle">(timeout → retries</text>
  <text x="115" y="148" fill="#9fd0ff" font-size="9" text-anchor="middle">with the SAME key)</text>

  <!-- first request -->
  <path d="M190 100 L250 100" stroke="#2ea043" stroke-width="1.5" marker-end="url(#g)"/>
  <text x="220" y="92" fill="#7ee2a8" font-size="8.5">①</text>
  <rect x="250" y="74" width="500" height="78" rx="9" fill="#11161c" stroke="#2ea043" stroke-width="1.5"/>
  <text x="500" y="94" fill="#7ee2a8" font-size="11" font-weight="700" text-anchor="middle">FIRST request (key K7 is new)</text>
  <text x="500" y="114" fill="#a8e6c2" font-size="9.5" text-anchor="middle">in ONE atomic txn (M07): debit + credit + ledger-entry + INSERT key K7 (UNIQUE)</text>
  <text x="500" y="132" fill="#a8e6c2" font-size="9.5" text-anchor="middle">→ apply once, record "K7 → result R" · return R · money moves ONCE ✓</text>
  <text x="500" y="148" fill="#8b98a5" font-size="8.5" text-anchor="middle">key + effect are atomic — a crash between them can't double-apply</text>

  <!-- retry -->
  <path d="M190 230 L250 230" stroke="#d29922" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="220" y="222" fill="#f0c674" font-size="8.5">②</text>
  <rect x="250" y="204" width="500" height="78" rx="9" fill="#11161c" stroke="#d29922" stroke-width="1.5"/>
  <text x="500" y="224" fill="#f0c674" font-size="11" font-weight="700" text-anchor="middle">RETRY (same key K7 arrives again)</text>
  <text x="500" y="244" fill="#f5e6c7" font-size="9.5" text-anchor="middle">INSERT key K7 → UNIQUE CONSTRAINT fails → "already processed"</text>
  <text x="500" y="262" fill="#7ee2a8" font-size="9.5" text-anchor="middle">→ do NOT re-apply · return the recorded result R · NO double-charge ✓</text>
  <text x="500" y="278" fill="#8b98a5" font-size="8.5" text-anchor="middle">the database enforces dedup atomically (the unique index)</text>

  <!-- bottom principle -->
  <rect x="40" y="304" width="710" height="76" rx="10" fill="#0d1b12" stroke="#2ea043" stroke-width="1.3"/>
  <text x="395" y="326" fill="#7ee2a8" font-size="11.5" font-weight="700" text-anchor="middle">you CAN'T prevent duplicate delivery — so make duplicate PROCESSING harmless</text>
  <text x="395" y="346" fill="#a8e6c2" font-size="10" text-anchor="middle">at-least-once delivery (never lost) + idempotent processing (duplicates no-op) = exactly-once EFFECT</text>
  <text x="395" y="366" fill="#8b98a5" font-size="9.5" text-anchor="middle">the primitive under Sagas (12.8), CDC consumers (12.13), payment APIs · non-negotiable for money</text>

  <defs>
    <marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2ea043"/></marker>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#d29922"/></marker>
  </defs>
</svg>
