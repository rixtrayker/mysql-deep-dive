<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="430" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">12.8 · The Saga — local transactions + compensations (non-blocking, eventually consistent)</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">each step a normal single-node ACID txn · on failure, compensate the completed steps in reverse · every step idempotent</text>

  <!-- forward path -->
  <text x="60" y="84" fill="#7ee2a8" font-size="11" font-weight="700">forward steps (each a LOCAL ACID txn — no distributed locks)</text>
  <rect x="60" y="96" width="180" height="50" rx="8" fill="#13361f" stroke="#2ea043"/>
  <text x="150" y="116" fill="#7ee2a8" font-size="10" font-weight="700" text-anchor="middle">T1 (shard A)</text>
  <text x="150" y="133" fill="#a8e6c2" font-size="9" text-anchor="middle">debit source ✓</text>
  <path d="M240 121 L300 121" stroke="#2ea043" stroke-width="1.5" marker-end="url(#g)"/>
  <rect x="300" y="96" width="180" height="50" rx="8" fill="#13361f" stroke="#2ea043"/>
  <text x="390" y="116" fill="#7ee2a8" font-size="10" font-weight="700" text-anchor="middle">T2 (shard B)</text>
  <text x="390" y="133" fill="#a8e6c2" font-size="9" text-anchor="middle">credit destination ✓</text>
  <path d="M480 121 L540 121" stroke="#2ea043" stroke-width="1.5" marker-end="url(#g)"/>
  <rect x="540" y="96" width="180" height="50" rx="8" fill="#13361f" stroke="#2ea043"/>
  <text x="630" y="116" fill="#7ee2a8" font-size="10" font-weight="700" text-anchor="middle">Saga COMPLETE</text>
  <text x="630" y="133" fill="#a8e6c2" font-size="9" text-anchor="middle">all steps succeeded</text>

  <!-- failure + compensation -->
  <text x="60" y="184" fill="#ff7b72" font-size="11" font-weight="700">if a step FAILS → run compensations in REVERSE</text>
  <rect x="300" y="196" width="180" height="50" rx="8" fill="#3a1410" stroke="#da3633"/>
  <text x="390" y="216" fill="#ff7b72" font-size="10" font-weight="700" text-anchor="middle">T2 FAILS ✗</text>
  <text x="390" y="233" fill="#f5b7b3" font-size="9" text-anchor="middle">credit couldn't apply</text>
  <path d="M390 196 L390 160 L390 146" stroke="#da3633" stroke-width="1" stroke-dasharray="3 2"/>
  <path d="M300 221 L240 221" stroke="#da3633" stroke-width="1.5" marker-end="url(#r)"/>
  <rect x="60" y="196" width="180" height="50" rx="8" fill="#2d2150" stroke="#8957e5"/>
  <text x="150" y="216" fill="#d2a8ff" font-size="10" font-weight="700" text-anchor="middle">C1: compensate T1</text>
  <text x="150" y="233" fill="#e7d6ff" font-size="9" text-anchor="middle">re-credit source (undo debit)</text>
  <text x="150" y="266" fill="#cdb4ff" font-size="9" text-anchor="middle">semantic undo (a NEW txn), not a rollback</text>

  <!-- properties -->
  <rect x="60" y="288" width="330" height="100" rx="9" fill="#11161c" stroke="#1f6feb" stroke-width="1.3"/>
  <text x="225" y="308" fill="#9fd0ff" font-size="11" font-weight="700" text-anchor="middle">vs 2PC</text>
  <text x="225" y="328" fill="#7ee2a8" font-size="9.5" text-anchor="middle">✓ no distributed locks (each step local + fast)</text>
  <text x="225" y="344" fill="#7ee2a8" font-size="9.5" text-anchor="middle">✓ non-blocking (no coordinator freeze)</text>
  <text x="225" y="360" fill="#ff7b72" font-size="9.5" text-anchor="middle">✗ eventually consistent (in-flight window)</text>
  <text x="225" y="376" fill="#ff7b72" font-size="9.5" text-anchor="middle">✗ compensations must be correct + idempotent</text>

  <rect x="410" y="288" width="330" height="100" rx="9" fill="#11161c" stroke="#8957e5" stroke-width="1.3"/>
  <text x="575" y="308" fill="#d2a8ff" font-size="11" font-weight="700" text-anchor="middle">orchestration vs choreography</text>
  <text x="575" y="328" fill="#e7d6ff" font-size="9.5" text-anchor="middle">orchestration: a central driver runs steps/compensations</text>
  <text x="575" y="344" fill="#a8e6c2" font-size="9" text-anchor="middle">(clearer, monitorable — preferred for money)</text>
  <text x="575" y="362" fill="#e7d6ff" font-size="9.5" text-anchor="middle">choreography: each step emits an event → next</text>
  <text x="575" y="378" fill="#8b98a5" font-size="9" text-anchor="middle">(decoupled, but implicit + harder to debug)</text>

  <text x="400" y="414" fill="#8b98a5" font-size="10" text-anchor="middle">+ idempotency keys (12.9) · durable Saga state via outbox (12.11) so a crashed Saga RESUMES · reconciliation backstop (12.14)</text>

  <defs>
    <marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2ea043"/></marker>
    <marker id="r" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#da3633"/></marker>
  </defs>
</svg>
