<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="400" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">12.12 · Change Data Capture — the binlog IS the integration backbone</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">Debezium reads the binlog (as a replica) → Kafka → many consumers · reliable, ordered, no dual-writes</text>

  <!-- mysql + binlog -->
  <rect x="40" y="90" width="150" height="120" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.5"/>
  <text x="115" y="112" fill="#7ee2a8" font-size="11" font-weight="700" text-anchor="middle">MySQL (a shard)</text>
  <rect x="58" y="124" width="114" height="30" rx="5" fill="#13361f" stroke="#2ea043"/><text x="115" y="143" fill="#a8e6c2" font-size="9" text-anchor="middle">committed changes</text>
  <rect x="58" y="160" width="114" height="38" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="115" y="177" fill="#cde3ff" font-size="9" text-anchor="middle">BINARY LOG</text><text x="115" y="190" fill="#9fd0ff" font-size="8" text-anchor="middle">ROW format (M10/10.3)</text>

  <!-- debezium -->
  <path d="M190 175 L240 175" stroke="#8957e5" stroke-width="1.6" marker-end="url(#p)"/>
  <text x="215" y="166" fill="#cdb4ff" font-size="8" text-anchor="middle">streams</text>
  <rect x="240" y="130" width="150" height="90" rx="10" fill="#11161c" stroke="#8957e5" stroke-width="1.5"/>
  <text x="315" y="152" fill="#d2a8ff" font-size="10.5" font-weight="700" text-anchor="middle">Debezium (CDC)</text>
  <text x="315" y="170" fill="#e7d6ff" font-size="8.5" text-anchor="middle">connects as a REPLICA</text>
  <text x="315" y="184" fill="#e7d6ff" font-size="8.5" text-anchor="middle">parses → change events</text>
  <text x="315" y="200" fill="#a8e6c2" font-size="8" text-anchor="middle">tracks GTID → resumes</text>
  <text x="315" y="212" fill="#a8e6c2" font-size="8" text-anchor="middle">exactly (no loss/skip)</text>

  <!-- kafka -->
  <path d="M390 175 L440 175" stroke="#8957e5" stroke-width="1.6" marker-end="url(#p)"/>
  <rect x="440" y="140" width="110" height="70" rx="10" fill="#11161c" stroke="#1f6feb" stroke-width="1.4"/>
  <text x="495" y="166" fill="#9fd0ff" font-size="11" font-weight="700" text-anchor="middle">Kafka</text>
  <text x="495" y="184" fill="#cde3ff" font-size="8.5" text-anchor="middle">topic per table,</text>
  <text x="495" y="197" fill="#cde3ff" font-size="8.5" text-anchor="middle">in commit order</text>

  <!-- consumers -->
  <rect x="600" y="86" width="170" height="30" rx="6" fill="#13361f" stroke="#2ea043"/><text x="685" y="105" fill="#7ee2a8" font-size="9" text-anchor="middle">fraud detection (real-time)</text>
  <rect x="600" y="122" width="170" height="30" rx="6" fill="#13361f" stroke="#2ea043"/><text x="685" y="141" fill="#7ee2a8" font-size="9" text-anchor="middle">search index (Elasticsearch)</text>
  <rect x="600" y="158" width="170" height="30" rx="6" fill="#13361f" stroke="#2ea043"/><text x="685" y="177" fill="#7ee2a8" font-size="9" text-anchor="middle">reporting warehouse (M02/2.17)</text>
  <rect x="600" y="194" width="170" height="30" rx="6" fill="#13361f" stroke="#2ea043"/><text x="685" y="213" fill="#7ee2a8" font-size="9" text-anchor="middle">outbox relay (12.11)</text>
  <path d="M550 165 L596 100" stroke="#2ea043" stroke-width="1" fill="none"/>
  <path d="M550 170 L596 137" stroke="#2ea043" stroke-width="1" fill="none"/>
  <path d="M550 180 L596 173" stroke="#2ea043" stroke-width="1" fill="none"/>
  <path d="M550 185 L596 209" stroke="#2ea043" stroke-width="1" fill="none"/>

  <!-- properties -->
  <rect x="40" y="244" width="730" height="132" rx="10" fill="#0d1b12" stroke="#2ea043" stroke-width="1.3"/>
  <text x="405" y="266" fill="#7ee2a8" font-size="11.5" font-weight="700" text-anchor="middle">reuse the EXISTING replication log — it's already a reliable, ordered, durable record of every change</text>
  <text x="405" y="288" fill="#a8e6c2" font-size="10" text-anchor="middle">✓ no dual-writes (the committed change IS the event) · ✓ reliable + ordered + resumable (binlog/GTID)</text>
  <text x="405" y="306" fill="#a8e6c2" font-size="10" text-anchor="middle">✓ low-latency · ✓ decoupled (producers unaware of consumers) · ✓ non-intrusive (reads binlog, no primary load)</text>
  <text x="405" y="324" fill="#f0c674" font-size="10" text-anchor="middle">needs: binlog_format=ROW (M10/10.3) + sync_binlog=1 (M09/9.10) · consumers idempotent (12.13) for exactly-once effect</text>
  <text x="405" y="346" fill="#cdb4ff" font-size="10" text-anchor="middle">principle: the LOG is primary — replicas (M10), backups/PITR (M13), search, cache, analytics, services are all DERIVED consumers</text>
  <text x="405" y="366" fill="#8b98a5" font-size="9.5" text-anchor="middle">"turning the database inside-out" · also powers resharding (M11/11.14 VReplication) — one binlog, many uses</text>

  <defs><marker id="p" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8957e5"/></marker></defs>
</svg>
