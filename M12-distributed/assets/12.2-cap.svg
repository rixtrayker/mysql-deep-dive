<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="420" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">12.2 · CAP — under a partition, choose Consistency OR Availability</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">P isn't optional (partitions WILL happen) → the real choice is C-vs-A when partitioned · per-operation, not a free lunch</text>

  <!-- the partition -->
  <text x="400" y="80" fill="#f0c674" font-size="13" font-weight="700" text-anchor="middle">⚡ NETWORK PARTITION — the two sides can't talk</text>
  <line x1="400" y1="92" x2="400" y2="392" stroke="#d29922" stroke-width="2.5" stroke-dasharray="7 5"/>

  <!-- side 1 -->
  <rect x="40" y="100" width="150" height="40" rx="7" fill="#1b3a5c" stroke="#2f6db5"/>
  <text x="115" y="118" fill="#cde3ff" font-size="10" text-anchor="middle">side 1: WRITE arrives</text>
  <text x="115" y="133" fill="#9fd0ff" font-size="9" text-anchor="middle">balance → $50</text>

  <!-- CP branch -->
  <rect x="40" y="160" width="330" height="100" rx="10" fill="#11161c" stroke="#1f6feb" stroke-width="1.6"/>
  <text x="205" y="182" fill="#9fd0ff" font-size="12.5" font-weight="700" text-anchor="middle">CP — keep CONSISTENT</text>
  <text x="205" y="204" fill="#cde3ff" font-size="10" text-anchor="middle">side 2 can't confirm the latest → REJECTS / waits</text>
  <text x="205" y="222" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ never returns wrong data</text>
  <text x="205" y="240" fill="#ff7b72" font-size="10" text-anchor="middle">✗ unavailable during the partition</text>

  <rect x="40" y="272" width="330" height="100" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.4"/>
  <text x="205" y="294" fill="#7ee2a8" font-size="12.5" font-weight="700" text-anchor="middle">money: balance-for-AUTHORIZATION</text>
  <text x="205" y="316" fill="#a8e6c2" font-size="10" text-anchor="middle">→ choose CP — reject rather than authorize</text>
  <text x="205" y="334" fill="#a8e6c2" font-size="10" text-anchor="middle">against stale data (overdraft / double-spend)</text>
  <text x="205" y="356" fill="#8b98a5" font-size="9.5" text-anchor="middle">(group replication minority side, fencing, M10/10.11)</text>

  <!-- side 2 -->
  <rect x="610" y="100" width="150" height="40" rx="7" fill="#1b3a5c" stroke="#2f6db5"/>
  <text x="685" y="118" fill="#cde3ff" font-size="10" text-anchor="middle">side 2: READ arrives</text>
  <text x="685" y="133" fill="#9fd0ff" font-size="9" text-anchor="middle">hasn't seen the write</text>

  <!-- AP branch -->
  <rect x="430" y="160" width="330" height="100" rx="10" fill="#11161c" stroke="#d29922" stroke-width="1.6"/>
  <text x="595" y="182" fill="#f0c674" font-size="12.5" font-weight="700" text-anchor="middle">AP — keep AVAILABLE</text>
  <text x="595" y="204" fill="#f5e6c7" font-size="10" text-anchor="middle">side 2 ANSWERS with its (stale) data</text>
  <text x="595" y="222" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ always responds</text>
  <text x="595" y="240" fill="#ff7b72" font-size="10" text-anchor="middle">✗ returns STALE (old balance) → reconcile later</text>

  <rect x="430" y="272" width="330" height="100" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.4"/>
  <text x="595" y="294" fill="#7ee2a8" font-size="12.5" font-weight="700" text-anchor="middle">money: DISPLAY recent activity</text>
  <text x="595" y="316" fill="#a8e6c2" font-size="10" text-anchor="middle">→ choose AP — better slightly-stale</text>
  <text x="595" y="334" fill="#a8e6c2" font-size="10" text-anchor="middle">than an error (staleness harmless)</text>
  <text x="595" y="356" fill="#8b98a5" font-size="9.5" text-anchor="middle">(async replica read, M10/10.5)</text>

  <text x="115" y="158" fill="#58a6ff" font-size="9" text-anchor="middle">↓</text>
  <text x="685" y="158" fill="#d29922" font-size="9" text-anchor="middle">↓</text>
</svg>
