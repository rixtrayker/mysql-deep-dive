<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="380" fill="#0f1419"/>
  <text x="400" y="26" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">16.9 · Multi-currency &amp; FX — minor units, rate snapshots, rounding</text>
  <text x="400" y="46" fill="#8b98a5" font-size="12" text-anchor="middle">money is PER-CURRENCY minor units (never FLOAT) · FX needs an immutable RATE SNAPSHOT · careful ROUNDING</text>

  <!-- per-currency -->
  <rect x="20" y="62" width="245" height="120" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.4"/>
  <text x="142" y="84" fill="#7ee2a8" font-size="11" font-weight="700" text-anchor="middle">PER-CURRENCY MINOR UNITS</text>
  <text x="142" y="106" fill="#a8e6c2" font-size="9.5" text-anchor="middle">amount_minor BIGINT</text>
  <text x="142" y="122" fill="#a8e6c2" font-size="9.5" text-anchor="middle">+ currency CHAR(3) (M03)</text>
  <text x="142" y="144" fill="#a8e6c2" font-size="9.5" text-anchor="middle">balances PER (account, currency)</text>
  <text x="142" y="162" fill="#ff7b72" font-size="9" text-anchor="middle">✗ never add USD to EUR · never FLOAT</text>

  <!-- rate snapshot -->
  <rect x="278" y="62" width="245" height="120" rx="10" fill="#11161c" stroke="#1f6feb" stroke-width="1.4"/>
  <text x="400" y="84" fill="#9fd0ff" font-size="11" font-weight="700" text-anchor="middle">RATE SNAPSHOT</text>
  <text x="400" y="106" fill="#cde3ff" font-size="9.5" text-anchor="middle">record the EXACT rate used</text>
  <text x="400" y="122" fill="#cde3ff" font-size="9.5" text-anchor="middle">at transaction time (immutable)</text>
  <text x="400" y="144" fill="#cde3ff" font-size="9.5" text-anchor="middle">→ auditable / reproducible</text>
  <text x="400" y="162" fill="#9fd0ff" font-size="9" text-anchor="middle">for dispute + compliance (16.8)</text>

  <!-- rounding -->
  <rect x="536" y="62" width="244" height="120" rx="10" fill="#11161c" stroke="#d29922" stroke-width="1.4"/>
  <text x="658" y="84" fill="#f0c674" font-size="11" font-weight="700" text-anchor="middle">ROUNDING</text>
  <text x="658" y="106" fill="#f5e6c7" font-size="9.5" text-anchor="middle">defined rule (round-half-even)</text>
  <text x="658" y="122" fill="#f5e6c7" font-size="9.5" text-anchor="middle">deterministic + consistent</text>
  <text x="658" y="144" fill="#f5e6c7" font-size="9.5" text-anchor="middle">RESIDUAL → a rounding account</text>
  <text x="658" y="162" fill="#ff7b72" font-size="9" text-anchor="middle">✗ never silently dropped</text>

  <!-- worked: cross-currency -->
  <rect x="20" y="196" width="760" height="84" rx="10" fill="#11161c" stroke="#8957e5" stroke-width="1.3"/>
  <text x="400" y="218" fill="#d2a8ff" font-size="11.5" font-weight="700" text-anchor="middle">a cross-currency transfer (USD → EUR) = TWO movements at a recorded rate</text>
  <rect x="60" y="230" width="200" height="34" rx="5" fill="#3a1410" stroke="#da3633"/><text x="160" y="248" fill="#f5b7b3" font-size="9" text-anchor="middle">debit −10000 USD-minor</text><text x="160" y="260" fill="#f5b7b3" font-size="8.5" text-anchor="middle">(source account)</text>
  <rect x="300" y="230" width="200" height="34" rx="5" fill="#3a2e0a" stroke="#d29922"/><text x="400" y="248" fill="#f5e6c7" font-size="9" text-anchor="middle">× rate 0.92 (snapshot)</text><text x="400" y="260" fill="#f5e6c7" font-size="8.5" text-anchor="middle">round-half-even</text>
  <rect x="540" y="230" width="200" height="34" rx="5" fill="#13361f" stroke="#2ea043"/><text x="640" y="248" fill="#a8e6c2" font-size="9" text-anchor="middle">credit +9200 EUR-minor</text><text x="640" y="260" fill="#a8e6c2" font-size="8.5" text-anchor="middle">(dest account)</text>
  <path d="M262 247 L298 247" stroke="#8b98a5" stroke-width="1.2" marker-end="url(#a)"/>
  <path d="M502 247 L538 247" stroke="#8b98a5" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="20" y="294" width="760" height="74" rx="10" fill="#0d1b12" stroke="#2ea043" stroke-width="1.4"/>
  <text x="400" y="316" fill="#7ee2a8" font-size="11.5" font-weight="700" text-anchor="middle">💰 multi-currency money-never-lies: per-currency minor units (no precision loss) + rate snapshots (exact, auditable)</text>
  <text x="400" y="338" fill="#a8e6c2" font-size="9.5" text-anchor="middle">+ rounding-residual accounting (no money silently lost) · double-entry holds PER currency (conservation within each currency)</text>
  <text x="400" y="358" fill="#8b98a5" font-size="9.5" text-anchor="middle">over millions of transactions, sloppy rounding loses REAL money — treat each currency as its own money</text>

  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8b98a5"/></marker></defs>
</svg>
