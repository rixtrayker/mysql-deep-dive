<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 410" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="410" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">13.11 · Early-warning signals — predict, don't react</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">the M08/M09/M10 internals ARE the leading indicators — they climb BEFORE the failure → act during the buildup</text>

  <!-- each signal: leading indicator → what it predicts -->
  <rect x="20" y="66" width="375" height="76" rx="9" fill="#11161c" stroke="#1f6feb" stroke-width="1.3"/>
  <text x="35" y="86" fill="#9fd0ff" font-size="11" font-weight="700">replication LAG (M10/10.5)</text>
  <text x="35" y="106" fill="#cde3ff" font-size="9">growing lag →</text>
  <text x="35" y="124" fill="#ff7b72" font-size="9.5">predicts: stale reads (money bug) + failover data-loss window</text>
  <text x="35" y="138" fill="#8b98a5" font-size="8.5">act: find the slow query / write spike before it bites</text>

  <rect x="405" y="66" width="375" height="76" rx="9" fill="#11161c" stroke="#8957e5" stroke-width="1.3"/>
  <text x="420" y="86" fill="#d2a8ff" font-size="11" font-weight="700">history-list length / HLL (M08/M09)</text>
  <text x="420" y="106" fill="#e7d6ff" font-size="9">growing HLL →</text>
  <text x="420" y="124" fill="#ff7b72" font-size="9.5">predicts: a long txn pins undo → bloat + purge stalls</text>
  <text x="420" y="138" fill="#8b98a5" font-size="8.5">act: find + kill the long transaction (M07/7.15)</text>

  <rect x="20" y="150" width="375" height="76" rx="9" fill="#11161c" stroke="#d29922" stroke-width="1.3"/>
  <text x="35" y="170" fill="#f0c674" font-size="11" font-weight="700">checkpoint age (M09)</text>
  <text x="35" y="190" fill="#f5e6c7" font-size="9">high checkpoint age →</text>
  <text x="35" y="208" fill="#ff7b72" font-size="9.5">predicts: a forced flush STALL (write freeze)</text>
  <text x="35" y="222" fill="#8b98a5" font-size="8.5">act: before the redo log fills (adaptive flushing, M09)</text>

  <rect x="405" y="150" width="375" height="76" rx="9" fill="#11161c" stroke="#2ea043" stroke-width="1.3"/>
  <text x="420" y="170" fill="#7ee2a8" font-size="11" font-weight="700">connection saturation (13.12)</text>
  <text x="420" y="190" fill="#a8e6c2" font-size="9">Threads_connected → max_connections →</text>
  <text x="420" y="208" fill="#ff7b72" font-size="9.5">predicts: "too many connections" outage</text>
  <text x="420" y="222" fill="#8b98a5" font-size="8.5">act: pooling (13.12) + alert before saturation</text>

  <rect x="20" y="234" width="375" height="76" rx="9" fill="#11161c" stroke="#da3633" stroke-width="1.6"/>
  <text x="35" y="254" fill="#ff7b72" font-size="11" font-weight="700">semi-sync status (M10/10.12) ★ the money gotcha</text>
  <text x="35" y="274" fill="#f5b7b3" font-size="9">Rpl_semi_sync_source_status = 0 →</text>
  <text x="35" y="292" fill="#ff7b72" font-size="9.5">REVEALS: silently degraded to async = LOST replica durability</text>
  <text x="35" y="306" fill="#8b98a5" font-size="8.5">act: alert IMMEDIATELY — you think you're durable but aren't</text>

  <rect x="405" y="234" width="375" height="76" rx="9" fill="#11161c" stroke="#d29922" stroke-width="1.3"/>
  <text x="420" y="254" fill="#f0c674" font-size="11" font-weight="700">disk space / I/O</text>
  <text x="420" y="274" fill="#f5e6c7" font-size="9">filling disk →</text>
  <text x="420" y="292" fill="#ff7b72" font-size="9.5">predicts: a write failure / crash (M15)</text>
  <text x="420" y="306" fill="#8b98a5" font-size="8.5">act: alert well before full</text>

  <rect x="20" y="324" width="760" height="68" rx="10" fill="#0d1b12" stroke="#2ea043" stroke-width="1.3"/>
  <text x="400" y="346" fill="#7ee2a8" font-size="11.5" font-weight="700" text-anchor="middle">watch the LEADING indicators (climbing before failure), not just the LAGGING ones (the failure) → intervene while preventable</text>
  <text x="400" y="368" fill="#a8e6c2" font-size="10" text-anchor="middle">the best incident is the one you prevented by acting on the early warning · alert at ACTIONABLE thresholds (no fatigue) + runbooks (M14)</text>
  <text x="400" y="386" fill="#8b98a5" font-size="9.5" text-anchor="middle">these UN-watched become the M15 incident · per shard (M11)</text>
</svg>
