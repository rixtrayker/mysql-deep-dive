<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="400" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">13.6 · Online schema change — shadow copy + sync + atomic cutover</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">the SAME copy → sync (via change log) → cutover pattern as resharding (M11/11.14) — never modify-in-place-while-locked</text>

  <!-- naive -->
  <rect x="20" y="66" width="360" height="120" rx="10" fill="#11161c" stroke="#da3633" stroke-width="1.6"/>
  <text x="200" y="88" fill="#ff7b72" font-size="12.5" font-weight="700" text-anchor="middle">✗ naive ALTER TABLE (COPY)</text>
  <rect x="50" y="100" width="300" height="34" rx="6" fill="#3a1410" stroke="#da3633"/>
  <text x="200" y="121" fill="#f5b7b3" font-size="10" text-anchor="middle">rebuild the WHOLE table, LOCKED, for HOURS</text>
  <text x="200" y="152" fill="#ff7b72" font-size="10" text-anchor="middle">→ blocks ALL reads + writes (or MDL stall, M08)</text>
  <text x="200" y="170" fill="#f5b7b3" font-size="9.5" text-anchor="middle">= locks out every transfer · unacceptable for the ledger</text>

  <!-- online -->
  <rect x="420" y="66" width="360" height="120" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.6"/>
  <text x="600" y="88" fill="#7ee2a8" font-size="12.5" font-weight="700" text-anchor="middle">✓ ONLINE DDL (gh-ost / native)</text>
  <text x="600" y="110" fill="#a8e6c2" font-size="10" text-anchor="middle">original stays FULLY available throughout</text>
  <text x="600" y="130" fill="#a8e6c2" font-size="10" text-anchor="middle">only a momentary lock at the cutover rename</text>
  <text x="600" y="152" fill="#7ee2a8" font-size="10" text-anchor="middle">→ near-zero downtime · throttleable · abortable</text>
  <text x="600" y="170" fill="#a8e6c2" font-size="9.5" text-anchor="middle">= add a column to a billion-row ledger, no lockout</text>

  <!-- the four steps -->
  <text x="400" y="214" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">the online-DDL pattern (the original stays live)</text>

  <rect x="30" y="228" width="170" height="84" rx="9" fill="#11161c" stroke="#1f6feb" stroke-width="1.3"/>
  <text x="115" y="248" fill="#9fd0ff" font-size="10.5" font-weight="700" text-anchor="middle">① SHADOW</text>
  <text x="115" y="268" fill="#cde3ff" font-size="9" text-anchor="middle">create an empty table</text>
  <text x="115" y="282" fill="#cde3ff" font-size="9" text-anchor="middle">with the NEW schema</text>
  <text x="115" y="300" fill="#8b98a5" font-size="8.5" text-anchor="middle">alongside the original</text>

  <path d="M202 270 L226 270" stroke="#8b98a5" stroke-width="1.4" marker-end="url(#s)"/>

  <rect x="228" y="228" width="170" height="84" rx="9" fill="#11161c" stroke="#1f6feb" stroke-width="1.3"/>
  <text x="313" y="248" fill="#9fd0ff" font-size="10.5" font-weight="700" text-anchor="middle">② BACKFILL</text>
  <text x="313" y="268" fill="#cde3ff" font-size="9" text-anchor="middle">copy rows in throttled</text>
  <text x="313" y="282" fill="#cde3ff" font-size="9" text-anchor="middle">chunks (pause on lag/load)</text>
  <text x="313" y="300" fill="#8b98a5" font-size="8.5" text-anchor="middle">M10 lag-aware throttle</text>

  <path d="M400 270 L424 270" stroke="#8b98a5" stroke-width="1.4" marker-end="url(#s)"/>

  <rect x="426" y="228" width="170" height="84" rx="9" fill="#11161c" stroke="#8957e5" stroke-width="1.3"/>
  <text x="511" y="248" fill="#d2a8ff" font-size="10.5" font-weight="700" text-anchor="middle">③ SYNC</text>
  <text x="511" y="268" fill="#e7d6ff" font-size="9" text-anchor="middle">live changes → shadow via</text>
  <text x="511" y="282" fill="#e7d6ff" font-size="9" text-anchor="middle">TRIGGERS (pt-osc) or</text>
  <text x="511" y="296" fill="#e7d6ff" font-size="9" text-anchor="middle">BINLOG (gh-ost, M10) (13.7)</text>

  <path d="M598 270 L622 270" stroke="#8b98a5" stroke-width="1.4" marker-end="url(#s)"/>

  <rect x="624" y="228" width="156" height="84" rx="9" fill="#11161c" stroke="#2ea043" stroke-width="1.5"/>
  <text x="702" y="248" fill="#7ee2a8" font-size="10.5" font-weight="700" text-anchor="middle">④ CUTOVER</text>
  <text x="702" y="268" fill="#a8e6c2" font-size="9" text-anchor="middle">atomic RENAME shadow</text>
  <text x="702" y="282" fill="#a8e6c2" font-size="9" text-anchor="middle">→ original (brief lock)</text>
  <text x="702" y="300" fill="#a8e6c2" font-size="8.5" text-anchor="middle">new schema live</text>

  <text x="400" y="346" fill="#cdb4ff" font-size="10.5" text-anchor="middle">online change = build-new-alongside + sync-via-change-log + atomic-cutover (= resharding M11/11.14, blue-green, CDC M12)</text>
  <text x="400" y="368" fill="#8b98a5" font-size="10" text-anchor="middle">cost: ~2× disk during migration, slower than a direct ALTER · use native INSTANT/INPLACE (13.8) for the easy changes</text>

  <defs><marker id="s" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8b98a5"/></marker></defs>
</svg>
