<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="400" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">13.9 · Observability — the three pillars + the four golden signals</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">you can't operate what you can't see · alert on the golden signals so problems surface EARLY, not as a 3am outage</text>

  <!-- three pillars -->
  <rect x="20" y="66" width="240" height="120" rx="10" fill="#11161c" stroke="#1f6feb" stroke-width="1.3"/>
  <text x="140" y="88" fill="#9fd0ff" font-size="11.5" font-weight="700" text-anchor="middle">METRICS</text>
  <text x="140" y="108" fill="#cde3ff" font-size="9.5" text-anchor="middle">numeric time-series</text>
  <text x="140" y="124" fill="#cde3ff" font-size="9.5" text-anchor="middle">(QPS, latency, connections,</text>
  <text x="140" y="138" fill="#cde3ff" font-size="9.5" text-anchor="middle">lag, buffer-pool hit%)</text>
  <text x="140" y="160" fill="#a8e6c2" font-size="9" text-anchor="middle">cheap · aggregatable · ALERTABLE</text>
  <text x="140" y="176" fill="#8b98a5" font-size="8.5" text-anchor="middle">SHOW STATUS, P_S, OS → Prometheus</text>

  <rect x="280" y="66" width="240" height="120" rx="10" fill="#11161c" stroke="#d29922" stroke-width="1.3"/>
  <text x="400" y="88" fill="#f0c674" font-size="11.5" font-weight="700" text-anchor="middle">LOGS</text>
  <text x="400" y="108" fill="#f5e6c7" font-size="9.5" text-anchor="middle">discrete events</text>
  <text x="400" y="124" fill="#f5e6c7" font-size="9.5" text-anchor="middle">slow query log · error log</text>
  <text x="400" y="138" fill="#f5e6c7" font-size="9.5" text-anchor="middle">audit log (13.14)</text>
  <text x="400" y="160" fill="#a8e6c2" font-size="9" text-anchor="middle">detailed · for DIAGNOSIS</text>
  <text x="400" y="176" fill="#8b98a5" font-size="8.5" text-anchor="middle">pt-query-digest ranks by total time</text>

  <rect x="540" y="66" width="240" height="120" rx="10" fill="#11161c" stroke="#8957e5" stroke-width="1.3"/>
  <text x="660" y="88" fill="#d2a8ff" font-size="11.5" font-weight="700" text-anchor="middle">TRACES</text>
  <text x="660" y="108" fill="#e7d6ff" font-size="9.5" text-anchor="middle">a request's path across</text>
  <text x="660" y="124" fill="#e7d6ff" font-size="9.5" text-anchor="middle">services (app → DB → replica</text>
  <text x="660" y="138" fill="#e7d6ff" font-size="9.5" text-anchor="middle">→ other systems, M12)</text>
  <text x="660" y="160" fill="#a8e6c2" font-size="9" text-anchor="middle">for distributed WHERE-diagnosis</text>

  <!-- golden signals -->
  <text x="400" y="216" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">organized by the FOUR GOLDEN SIGNALS</text>

  <rect x="30" y="230" width="180" height="84" rx="9" fill="#0d1b12" stroke="#2ea043" stroke-width="1.3"/>
  <text x="120" y="252" fill="#7ee2a8" font-size="11" font-weight="700" text-anchor="middle">LATENCY</text>
  <text x="120" y="272" fill="#a8e6c2" font-size="9" text-anchor="middle">how long queries take</text>
  <text x="120" y="288" fill="#a8e6c2" font-size="9" text-anchor="middle">(p50 / p95 / p99)</text>
  <text x="120" y="306" fill="#8b98a5" font-size="8.5" text-anchor="middle">slow log, P_S</text>

  <rect x="220" y="230" width="180" height="84" rx="9" fill="#0d1b12" stroke="#2ea043" stroke-width="1.3"/>
  <text x="310" y="252" fill="#7ee2a8" font-size="11" font-weight="700" text-anchor="middle">TRAFFIC</text>
  <text x="310" y="272" fill="#a8e6c2" font-size="9" text-anchor="middle">how many — QPS / TPS</text>
  <text x="310" y="306" fill="#8b98a5" font-size="8.5" text-anchor="middle">Questions, Com_*</text>

  <rect x="410" y="230" width="180" height="84" rx="9" fill="#0d1b12" stroke="#2ea043" stroke-width="1.3"/>
  <text x="500" y="252" fill="#7ee2a8" font-size="11" font-weight="700" text-anchor="middle">ERRORS</text>
  <text x="500" y="272" fill="#a8e6c2" font-size="9" text-anchor="middle">failed queries / conns,</text>
  <text x="500" y="286" fill="#a8e6c2" font-size="9" text-anchor="middle">deadlocks, repl errors</text>
  <text x="500" y="306" fill="#8b98a5" font-size="8.5" text-anchor="middle">Aborted_connects</text>

  <rect x="600" y="230" width="180" height="84" rx="9" fill="#11161c" stroke="#f0c674" stroke-width="1.8"/>
  <text x="690" y="252" fill="#f0c674" font-size="11" font-weight="700" text-anchor="middle">SATURATION ★</text>
  <text x="690" y="272" fill="#f5e6c7" font-size="9" text-anchor="middle">how full — CPU, conns,</text>
  <text x="690" y="286" fill="#f5e6c7" font-size="9" text-anchor="middle">buffer pool, disk, LAG</text>
  <text x="690" y="306" fill="#7ee2a8" font-size="8.5" text-anchor="middle">the LEADING indicator (13.11)</text>

  <text x="400" y="344" fill="#cdb4ff" font-size="10.5" text-anchor="middle">saturation predicts the others → the early-warning signals (13.11) → catch trouble during the buildup, while preventable</text>
  <text x="400" y="368" fill="#8b98a5" font-size="10" text-anchor="middle">+ reconciliation (M12/12.14) as the money-correctness watchdog · for sharding, monitor per shard (M11)</text>
</svg>
