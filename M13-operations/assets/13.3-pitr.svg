<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="380" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">13.3 · Point-in-time recovery — full backup + binlog replay to ANY moment</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">stop the replay JUST BEFORE the disaster → keep all good data, exclude only the bad change</text>

  <!-- timeline -->
  <line x1="60" y1="150" x2="740" y2="150" stroke="#30363d" stroke-width="2"/>
  <text x="60" y="175" fill="#8b98a5" font-size="9" text-anchor="middle">00:00</text>
  <text x="740" y="175" fill="#8b98a5" font-size="9" text-anchor="middle">now</text>

  <!-- base backup -->
  <circle cx="120" cy="150" r="8" fill="#13361f" stroke="#2ea043" stroke-width="1.6"/>
  <rect x="60" y="96" width="120" height="40" rx="7" fill="#11161c" stroke="#2ea043"/>
  <text x="120" y="112" fill="#7ee2a8" font-size="9.5" font-weight="700" text-anchor="middle">① FULL BACKUP</text>
  <text x="120" y="127" fill="#a8e6c2" font-size="8.5" text-anchor="middle">midnight (13.2)</text>
  <path d="M120 136 L120 142" stroke="#2ea043" stroke-width="1.3"/>

  <!-- binlog replay -->
  <rect x="128" y="138" width="430" height="24" rx="4" fill="#1b3a5c" stroke="#2f6db5"/>
  <text x="343" y="155" fill="#cde3ff" font-size="9.5" text-anchor="middle">② replay BINLOG forward (M10) — every committed change since midnight</text>
  <path d="M180 150 L550 150" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- disaster -->
  <circle cx="560" cy="150" r="9" fill="#3a1410" stroke="#da3633" stroke-width="2"/>
  <rect x="500" y="186" width="160" height="56" rx="7" fill="#11161c" stroke="#da3633" stroke-width="1.6"/>
  <text x="580" y="206" fill="#ff7b72" font-size="9.5" font-weight="700" text-anchor="middle">⚡ DISASTER 14:30:01</text>
  <text x="580" y="222" fill="#f5b7b3" font-size="8.5" text-anchor="middle">DELETE without WHERE</text>
  <text x="580" y="236" fill="#f5b7b3" font-size="8.5" text-anchor="middle">(bad deploy)</text>
  <path d="M560 159 L580 184" stroke="#da3633" stroke-width="1.2"/>

  <!-- stop point -->
  <circle cx="540" cy="150" r="8" fill="#3a2e0a" stroke="#d29922" stroke-width="2"/>
  <rect x="450" y="96" width="180" height="44" rx="7" fill="#11161c" stroke="#d29922" stroke-width="1.6"/>
  <text x="540" y="114" fill="#f0c674" font-size="9.5" font-weight="700" text-anchor="middle">③ STOP at 14:29:59</text>
  <text x="540" y="130" fill="#f5e6c7" font-size="8.5" text-anchor="middle">--stop-datetime (one second before)</text>
  <path d="M540 140 L540 144" stroke="#d29922" stroke-width="1.3"/>

  <!-- result -->
  <rect x="60" y="262" width="680" height="58" rx="9" fill="#0d1b12" stroke="#2ea043" stroke-width="1.4"/>
  <text x="400" y="284" fill="#7ee2a8" font-size="11.5" font-weight="700" text-anchor="middle">→ ledger recovered to 14:29:59 — every legitimate transfer kept, the bad DELETE EXCLUDED (lost 1 second)</text>
  <text x="400" y="304" fill="#a8e6c2" font-size="9.5" text-anchor="middle">needs: a base backup + binlog RETAINED (binlog_expire_logs_seconds) + DURABLE (sync_binlog=1, M09) · GTID = precise replay (M10/10.7)</text>

  <text x="400" y="344" fill="#cdb4ff" font-size="10.5" text-anchor="middle">the binlog's THIRD use (after replicas M10, CDC M12) — the log is primary; replay it to reconstruct ANY past state · per-shard (M11)</text>
  <text x="400" y="364" fill="#8b98a5" font-size="10" text-anchor="middle">frequent base backups limit replay time (RTO) · PITR GAPS (binlog not retained/durable) = M15 catastrophe</text>
</svg>
