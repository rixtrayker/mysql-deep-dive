<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 410" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="410" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">13.2 · Backup types — logical vs physical vs snapshot</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">a backup's value is dominated by RESTORE speed (RTO) · combine a fast base + the binlog for PITR (13.3)</text>

  <!-- LOGICAL -->
  <rect x="20" y="66" width="245" height="300" rx="10" fill="#11161c" stroke="#1f6feb" stroke-width="1.4"/>
  <text x="142" y="88" fill="#9fd0ff" font-size="12.5" font-weight="700" text-anchor="middle">LOGICAL</text>
  <text x="142" y="106" fill="#8b98a5" font-size="10" text-anchor="middle">mysqldump / mydumper</text>
  <text x="142" y="124" fill="#cde3ff" font-size="9.5" text-anchor="middle">dump SQL / data (the rows)</text>
  <text x="142" y="156" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ portable (any version/engine)</text>
  <text x="142" y="174" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ selective (one table/DB)</text>
  <text x="142" y="192" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ small, human-readable</text>
  <text x="142" y="216" fill="#ff7b72" font-size="10" text-anchor="middle">✗ SLOW restore</text>
  <text x="142" y="232" fill="#f5b7b3" font-size="9" text-anchor="middle">(re-run every INSERT,</text>
  <text x="142" y="245" fill="#f5b7b3" font-size="9" text-anchor="middle">rebuild every index)</text>
  <text x="142" y="268" fill="#ff7b72" font-size="10" text-anchor="middle">✗ slow to take (large DB)</text>
  <text x="142" y="304" fill="#cdb4ff" font-size="9.5" text-anchor="middle">use: portability / archive /</text>
  <text x="142" y="318" fill="#cdb4ff" font-size="9.5" text-anchor="middle">selective restore</text>
  <text x="142" y="346" fill="#8b98a5" font-size="9" text-anchor="middle">--single-transaction = consistent</text>

  <!-- PHYSICAL -->
  <rect x="278" y="66" width="245" height="300" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.6"/>
  <text x="400" y="88" fill="#7ee2a8" font-size="12.5" font-weight="700" text-anchor="middle">PHYSICAL</text>
  <text x="400" y="106" fill="#8b98a5" font-size="10" text-anchor="middle">Percona XtraBackup</text>
  <text x="400" y="124" fill="#a8e6c2" font-size="9.5" text-anchor="middle">copy the InnoDB files (bytes)</text>
  <text x="400" y="156" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ FAST restore (just files)</text>
  <text x="400" y="174" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ efficient for large DBs</text>
  <text x="400" y="192" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ INCREMENTALS (low RPO)</text>
  <text x="400" y="210" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ hot (runs while live)</text>
  <text x="400" y="234" fill="#ff7b72" font-size="10" text-anchor="middle">✗ less portable (version-tied)</text>
  <text x="400" y="252" fill="#ff7b72" font-size="10" text-anchor="middle">✗ coarser granularity</text>
  <text x="400" y="288" fill="#7ee2a8" font-size="9.5" font-weight="700" text-anchor="middle">the typical production BASE</text>
  <text x="400" y="306" fill="#a8e6c2" font-size="9.5" text-anchor="middle">restore = put files back +</text>
  <text x="400" y="320" fill="#a8e6c2" font-size="9.5" text-anchor="middle">apply redo (M09 crash-recovery)</text>
  <text x="400" y="348" fill="#8b98a5" font-size="9" text-anchor="middle">+ binlog → PITR (13.3)</text>

  <!-- SNAPSHOT -->
  <rect x="536" y="66" width="245" height="300" rx="10" fill="#11161c" stroke="#d29922" stroke-width="1.4"/>
  <text x="658" y="88" fill="#f0c674" font-size="12.5" font-weight="700" text-anchor="middle">SNAPSHOT</text>
  <text x="658" y="106" fill="#8b98a5" font-size="10" text-anchor="middle">LVM / cloud (EBS)</text>
  <text x="658" y="124" fill="#f5e6c7" font-size="9.5" text-anchor="middle">storage-level point-in-time image</text>
  <text x="658" y="156" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ VERY fast take + restore</text>
  <text x="658" y="174" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ storage-integrated, cheap</text>
  <text x="658" y="206" fill="#ff7b72" font-size="10" text-anchor="middle">✗ storage-dependent</text>
  <text x="658" y="224" fill="#ff7b72" font-size="10" text-anchor="middle">✗ consistency care needed</text>
  <text x="658" y="240" fill="#f5b7b3" font-size="9" text-anchor="middle">(flush+lock, or crash-consistent</text>
  <text x="658" y="253" fill="#f5b7b3" font-size="9" text-anchor="middle">+ redo recovery, M09)</text>
  <text x="658" y="271" fill="#ff7b72" font-size="10" text-anchor="middle">✗ whole-volume granularity</text>
  <text x="658" y="306" fill="#f5e6c7" font-size="9.5" text-anchor="middle">use: fast base where the</text>
  <text x="658" y="320" fill="#f5e6c7" font-size="9.5" text-anchor="middle">storage supports it</text>
  <text x="658" y="348" fill="#8b98a5" font-size="9" text-anchor="middle">+ binlog → PITR (13.3)</text>

  <text x="400" y="398" fill="#8b98a5" font-size="10.5" text-anchor="middle">payments: physical/snapshot BASE (fast RTO) + incrementals + continuous binlog (low RPO via PITR) + periodic logical (portability) · take from a REPLICA · ENCRYPT + TEST restore (13.5)</text>
</svg>
