<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="420" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">11.14 · Resharding live — copy → sync → verify → cutover (no lost transfer)</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">8 → 16 shards on a live ledger · Vitess Reshard: VReplication catch-up + VDiff verify + atomic SwitchTraffic</text>

  <!-- step 1 provision/copy -->
  <rect x="20" y="70" width="180" height="300" rx="10" fill="#11161c" stroke="#1f6feb" stroke-width="1.4"/>
  <text x="110" y="92" fill="#9fd0ff" font-size="11.5" font-weight="700" text-anchor="middle">① BACKFILL (copy)</text>
  <rect x="40" y="106" width="140" height="40" rx="6" fill="#1b3a5c" stroke="#2f6db5"/><text x="110" y="125" fill="#cde3ff" font-size="9" text-anchor="middle">source shard</text><text x="110" y="139" fill="#9fd0ff" font-size="8.5" text-anchor="middle">range [0,1)</text>
  <rect x="40" y="170" width="66" height="34" rx="5" fill="#13361f" stroke="#2ea043"/><text x="73" y="191" fill="#7ee2a8" font-size="8" text-anchor="middle">new [0,.5)</text>
  <rect x="114" y="170" width="66" height="34" rx="5" fill="#13361f" stroke="#2ea043"/><text x="147" y="191" fill="#7ee2a8" font-size="8" text-anchor="middle">new [.5,1)</text>
  <path d="M90 146 L73 168" stroke="#58a6ff" stroke-width="1.2" marker-end="url(#b)"/>
  <path d="M130 146 L147 168" stroke="#58a6ff" stroke-width="1.2" marker-end="url(#b)"/>
  <text x="110" y="234" fill="#cde3ff" font-size="9" text-anchor="middle">snapshot rows to</text>
  <text x="110" y="248" fill="#cde3ff" font-size="9" text-anchor="middle">their new homes</text>
  <text x="110" y="280" fill="#a8e6c2" font-size="9" text-anchor="middle">only the SPLIT range's</text>
  <text x="110" y="294" fill="#a8e6c2" font-size="9" text-anchor="middle">rows move (11.8)</text>
  <text x="110" y="340" fill="#8b98a5" font-size="8.5" text-anchor="middle">old shard keeps</text>
  <text x="110" y="353" fill="#8b98a5" font-size="8.5" text-anchor="middle">serving live traffic</text>

  <path d="M204 220 L222 220" stroke="#8b98a5" stroke-width="1.5" marker-end="url(#s)"/>

  <!-- step 2 sync -->
  <rect x="226" y="70" width="180" height="300" rx="10" fill="#11161c" stroke="#8957e5" stroke-width="1.4"/>
  <text x="316" y="92" fill="#d2a8ff" font-size="11.5" font-weight="700" text-anchor="middle">② CATCH-UP (sync)</text>
  <rect x="246" y="110" width="140" height="34" rx="6" fill="#2d2150" stroke="#8957e5"/><text x="316" y="131" fill="#e7d6ff" font-size="9" text-anchor="middle">binlog / VReplication</text>
  <path d="M316 144 L316 168" stroke="#8957e5" stroke-width="1.4" marker-end="url(#p)"/>
  <rect x="246" y="172" width="140" height="34" rx="6" fill="#13361f" stroke="#2ea043"/><text x="316" y="193" fill="#7ee2a8" font-size="9" text-anchor="middle">new shards apply</text>
  <text x="316" y="240" fill="#e7d6ff" font-size="9" text-anchor="middle">stream changes that</text>
  <text x="316" y="254" fill="#e7d6ff" font-size="9" text-anchor="middle">happened DURING +</text>
  <text x="316" y="268" fill="#e7d6ff" font-size="9" text-anchor="middle">after the snapshot</text>
  <text x="316" y="300" fill="#cdb4ff" font-size="9" text-anchor="middle">(M10/10.14 — the</text>
  <text x="316" y="314" fill="#cdb4ff" font-size="9" text-anchor="middle">change log makes</text>
  <text x="316" y="328" fill="#cdb4ff" font-size="9" text-anchor="middle">"copy while changing"</text>
  <text x="316" y="342" fill="#cdb4ff" font-size="9" text-anchor="middle">possible)</text>

  <path d="M410 220 L428 220" stroke="#8b98a5" stroke-width="1.5" marker-end="url(#s)"/>

  <!-- step 3 verify -->
  <rect x="432" y="70" width="180" height="300" rx="10" fill="#11161c" stroke="#d29922" stroke-width="1.4"/>
  <text x="522" y="92" fill="#f0c674" font-size="11.5" font-weight="700" text-anchor="middle">③ VERIFY (VDiff)</text>
  <rect x="452" y="112" width="140" height="64" rx="6" fill="#3a2e0a" stroke="#d29922"/>
  <text x="522" y="132" fill="#f0c674" font-size="9" text-anchor="middle">checksum source</text>
  <text x="522" y="147" fill="#f0c674" font-size="9" text-anchor="middle">vs target rows</text>
  <text x="522" y="164" fill="#7ee2a8" font-size="9" text-anchor="middle">counts + hashes match?</text>
  <text x="522" y="210" fill="#f5e6c7" font-size="9" text-anchor="middle">prove NO row</text>
  <text x="522" y="224" fill="#f5e6c7" font-size="9" text-anchor="middle">lost or duplicated</text>
  <text x="522" y="262" fill="#7ee2a8" font-size="9.5" font-weight="700" text-anchor="middle">reconciliation-grade</text>
  <text x="522" y="277" fill="#a8e6c2" font-size="9" text-anchor="middle">(M02/2.17)</text>
  <text x="522" y="318" fill="#f0c674" font-size="9" text-anchor="middle">for MONEY this step</text>
  <text x="522" y="332" fill="#f0c674" font-size="9" text-anchor="middle">is NON-negotiable</text>

  <path d="M616 220 L634 220" stroke="#8b98a5" stroke-width="1.5" marker-end="url(#s)"/>

  <!-- step 4 cutover -->
  <rect x="638" y="70" width="142" height="300" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.6"/>
  <text x="709" y="92" fill="#7ee2a8" font-size="11.5" font-weight="700" text-anchor="middle">④ CUTOVER</text>
  <rect x="652" y="110" width="114" height="30" rx="5" fill="#3a1410" stroke="#da3633"/><text x="709" y="129" fill="#f5b7b3" font-size="8.5" text-anchor="middle">brief write pause</text>
  <path d="M709 140 L709 158" stroke="#2ea043" stroke-width="1.3" marker-end="url(#g)"/>
  <rect x="652" y="160" width="114" height="30" rx="5" fill="#13361f" stroke="#2ea043"/><text x="709" y="179" fill="#7ee2a8" font-size="8.5" text-anchor="middle">atomic route switch</text>
  <text x="709" y="216" fill="#a8e6c2" font-size="8.5" text-anchor="middle">SwitchTraffic →</text>
  <text x="709" y="230" fill="#a8e6c2" font-size="8.5" text-anchor="middle">queries now go to</text>
  <text x="709" y="244" fill="#a8e6c2" font-size="8.5" text-anchor="middle">new shards</text>
  <text x="709" y="276" fill="#7ee2a8" font-size="8.5" text-anchor="middle">sub-second pause</text>
  <text x="709" y="306" fill="#f0c674" font-size="8.5" text-anchor="middle">keep old shards as</text>
  <text x="709" y="320" fill="#f0c674" font-size="8.5" text-anchor="middle">rollback until</text>
  <text x="709" y="334" fill="#f0c674" font-size="8.5" text-anchor="middle">verified healthy</text>

  <text x="400" y="396" fill="#cdb4ff" font-size="10.5" text-anchor="middle">the SAME copy-via-changelog-then-cutover pattern as online schema migration (gh-ost/pt-osc, M13) · catastrophic failures → M15</text>

  <defs>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#58a6ff"/></marker>
    <marker id="p" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8957e5"/></marker>
    <marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2ea043"/></marker>
    <marker id="s" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b98a5"/></marker>
  </defs>
</svg>
