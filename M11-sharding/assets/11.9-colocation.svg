<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="440" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">11.9 · Co-location — keep a transfer's two legs on ONE shard</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">the fintech rule: co-locate by the transaction boundary → the debit+credit stays a single-node ACID transaction</text>

  <!-- GOOD: co-located -->
  <rect x="20" y="66" width="370" height="200" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.6"/>
  <text x="205" y="88" fill="#7ee2a8" font-size="12.5" font-weight="700" text-anchor="middle">✓ CO-LOCATED (shard by tenant/ledger_group)</text>
  <rect x="115" y="104" width="180" height="120" rx="8" fill="#13361f" stroke="#2ea043" stroke-width="1.4"/>
  <text x="205" y="122" fill="#7ee2a8" font-size="10.5" font-weight="700" text-anchor="middle">SHARD 1</text>
  <rect x="135" y="132" width="140" height="30" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="205" y="151" fill="#cde3ff" font-size="9.5" text-anchor="middle">debit  acct A  −$100</text>
  <rect x="135" y="168" width="140" height="30" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="205" y="187" fill="#cde3ff" font-size="9.5" text-anchor="middle">credit  acct B  +$100</text>
  <path d="M205 162 L205 168" stroke="#7ee2a8" stroke-width="1.5"/>
  <text x="205" y="216" fill="#7ee2a8" font-size="10" text-anchor="middle">one BEGIN…COMMIT · atomic · durable · isolated</text>
  <text x="205" y="248" fill="#a8e6c2" font-size="11" font-weight="700" text-anchor="middle">single-shard ACID — ALL of M07–M09 intact ✓</text>

  <!-- BAD: cross-shard -->
  <rect x="410" y="66" width="370" height="200" rx="10" fill="#11161c" stroke="#da3633" stroke-width="1.6"/>
  <text x="595" y="88" fill="#ff7b72" font-size="12.5" font-weight="700" text-anchor="middle">✗ CROSS-SHARD (naive hash per account)</text>
  <rect x="430" y="104" width="160" height="84" rx="8" fill="#3a1410" stroke="#da3633" stroke-width="1.2"/>
  <text x="510" y="122" fill="#ff7b72" font-size="10.5" font-weight="700" text-anchor="middle">SHARD 1</text>
  <rect x="445" y="132" width="130" height="30" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="510" y="151" fill="#cde3ff" font-size="9.5" text-anchor="middle">debit acct A −$100</text>
  <rect x="600" y="104" width="160" height="84" rx="8" fill="#3a1410" stroke="#da3633" stroke-width="1.2"/>
  <text x="680" y="122" fill="#ff7b72" font-size="10.5" font-weight="700" text-anchor="middle">SHARD 2</text>
  <rect x="615" y="132" width="130" height="30" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="680" y="151" fill="#cde3ff" font-size="9.5" text-anchor="middle">credit acct B +$100</text>
  <path d="M575 147 L600 147" stroke="#ff7b72" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#x)"/>
  <text x="595" y="208" fill="#ff7b72" font-size="10" text-anchor="middle">no single commit spans 2 servers → NOT atomic</text>
  <text x="595" y="232" fill="#ff7b72" font-size="11" font-weight="700" text-anchor="middle">distributed txn: 2PC (blocking) or Saga (11.11)</text>
  <text x="595" y="252" fill="#f5b7b3" font-size="9.5" text-anchor="middle">crash between legs → money lost/duplicated</text>

  <!-- intermediary pattern -->
  <rect x="20" y="282" width="760" height="118" rx="10" fill="#11161c" stroke="#8957e5" stroke-width="1.4"/>
  <text x="400" y="304" fill="#d2a8ff" font-size="12" font-weight="700" text-anchor="middle">when a transfer MUST cross shards: clearing-account pattern (each physical txn stays LOCAL)</text>
  <rect x="50" y="318" width="200" height="66" rx="7" fill="#2d2150" stroke="#8957e5"/>
  <text x="150" y="338" fill="#d2a8ff" font-size="9.5" text-anchor="middle">SHARD 1 (local txn)</text>
  <text x="150" y="356" fill="#e7d6ff" font-size="9" text-anchor="middle">debit acct A −$100</text>
  <text x="150" y="372" fill="#e7d6ff" font-size="9" text-anchor="middle">credit S1-clearing +$100</text>
  <rect x="300" y="338" width="200" height="28" rx="6" fill="#1b3a5c" stroke="#2f6db5"/>
  <text x="400" y="357" fill="#cde3ff" font-size="9.5" text-anchor="middle">settle between clearing accts (Saga, M12)</text>
  <rect x="550" y="318" width="200" height="66" rx="7" fill="#2d2150" stroke="#8957e5"/>
  <text x="650" y="338" fill="#d2a8ff" font-size="9.5" text-anchor="middle">SHARD 2 (local txn)</text>
  <text x="650" y="356" fill="#e7d6ff" font-size="9" text-anchor="middle">debit S2-clearing −$100</text>
  <text x="650" y="372" fill="#e7d6ff" font-size="9" text-anchor="middle">credit acct B +$100</text>
  <path d="M250 352 L298 352" stroke="#8957e5" stroke-width="1.3" marker-end="url(#p2)"/>
  <path d="M500 352 L548 352" stroke="#8957e5" stroke-width="1.3" marker-end="url(#p2)"/>

  <text x="400" y="424" fill="#7ee2a8" font-size="11" text-anchor="middle">DESIGN GOAL: make the dominant transfer single-shard (co-located) · pay the cross-shard cost only on the rare minority</text>
  <text x="400" y="430" fill="#11161c" font-size="1">.</text>

  <defs>
    <marker id="x" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#ff7b72"/></marker>
    <marker id="p2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8957e5"/></marker>
  </defs>
</svg>
