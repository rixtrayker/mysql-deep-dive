<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="440" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">11.8 · Consistent hashing — add a shard, move only ~1/N of keys</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">naive hash(key) mod N remaps ~everything when N changes · the ring moves only the new shard's arc</text>

  <!-- naive mod N panel -->
  <rect x="20" y="66" width="245" height="340" rx="10" fill="#11161c" stroke="#da3633" stroke-width="1.4"/>
  <text x="142" y="88" fill="#ff7b72" font-size="12.5" font-weight="700" text-anchor="middle">naive  hash(key) mod N</text>
  <text x="142" y="112" fill="#f5b7b3" font-size="10.5" text-anchor="middle">8 shards → 9 shards</text>
  <rect x="40" y="128" width="205" height="30" rx="5" fill="#3a1410" stroke="#da3633"/>
  <text x="142" y="148" fill="#ff7b72" font-size="9.5" text-anchor="middle">key 100: mod 8 = 4 → mod 9 = 1  ✗ moved</text>
  <rect x="40" y="164" width="205" height="30" rx="5" fill="#3a1410" stroke="#da3633"/>
  <text x="142" y="184" fill="#ff7b72" font-size="9.5" text-anchor="middle">key 101: mod 8 = 5 → mod 9 = 2  ✗ moved</text>
  <rect x="40" y="200" width="205" height="30" rx="5" fill="#3a1410" stroke="#da3633"/>
  <text x="142" y="220" fill="#ff7b72" font-size="9.5" text-anchor="middle">key 102: mod 8 = 6 → mod 9 = 3  ✗ moved</text>
  <text x="142" y="270" fill="#ff7b72" font-size="22" font-weight="700" text-anchor="middle">~8/9 of keys</text>
  <text x="142" y="296" fill="#ff7b72" font-size="13" font-weight="700" text-anchor="middle">MOVE</text>
  <text x="142" y="330" fill="#f5b7b3" font-size="10.5" text-anchor="middle">≈ re-copy the WHOLE dataset</text>
  <text x="142" y="352" fill="#f5b7b3" font-size="10.5" text-anchor="middle">under live load</text>
  <text x="142" y="384" fill="#ff7b72" font-size="11" font-weight="700" text-anchor="middle">resharding ≈ impossible</text>

  <!-- ring panel -->
  <rect x="278" y="66" width="502" height="340" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.6"/>
  <text x="529" y="88" fill="#7ee2a8" font-size="12.5" font-weight="700" text-anchor="middle">consistent hashing — the ring (with virtual nodes)</text>

  <!-- the ring circle -->
  <circle cx="455" cy="250" r="118" fill="none" stroke="#30363d" stroke-width="2"/>
  <text x="455" y="254" fill="#8b98a5" font-size="9" text-anchor="middle">hash space</text>
  <text x="455" y="268" fill="#8b98a5" font-size="9" text-anchor="middle">0 … 2³²−1 (wraps)</text>

  <!-- shard points on ring -->
  <circle cx="455" cy="132" r="9" fill="#13361f" stroke="#2ea043" stroke-width="1.5"/><text x="455" y="120" fill="#7ee2a8" font-size="9" text-anchor="middle">S1</text>
  <circle cx="573" cy="250" r="9" fill="#13361f" stroke="#2ea043" stroke-width="1.5"/><text x="592" y="254" fill="#7ee2a8" font-size="9" text-anchor="middle">S2</text>
  <circle cx="455" cy="368" r="9" fill="#13361f" stroke="#2ea043" stroke-width="1.5"/><text x="455" y="388" fill="#7ee2a8" font-size="9" text-anchor="middle">S3</text>
  <circle cx="337" cy="250" r="9" fill="#13361f" stroke="#2ea043" stroke-width="1.5"/><text x="316" y="254" fill="#7ee2a8" font-size="9" text-anchor="middle">S4</text>

  <!-- keys on ring -->
  <circle cx="520" cy="160" r="5" fill="#58a6ff"/><circle cx="555" cy="205" r="5" fill="#58a6ff"/>
  <circle cx="540" cy="310" r="5" fill="#58a6ff"/><circle cx="390" cy="350" r="5" fill="#58a6ff"/>
  <circle cx="350" cy="190" r="5" fill="#58a6ff"/>
  <text x="455" y="228" fill="#9fd0ff" font-size="8.5" text-anchor="middle">key → next shard clockwise</text>

  <!-- new shard insert -->
  <circle cx="513" cy="305" r="10" fill="#2d2150" stroke="#8957e5" stroke-width="2"/><text x="528" y="322" fill="#d2a8ff" font-size="9" text-anchor="middle">+S5</text>
  <path d="M495 290 Q500 270 513 295" stroke="#8957e5" stroke-width="1.5" fill="none" marker-end="url(#p)"/>
  <text x="600" y="320" fill="#d2a8ff" font-size="9" text-anchor="middle">new shard inserted</text>

  <!-- right summary -->
  <text x="455" y="408" fill="#7ee2a8" font-size="10.5" text-anchor="middle">+S5 steals only its ARC from S3 → only ~1/N keys move; everything else stays put</text>

  <text x="700" y="120" fill="#cdb4ff" font-size="9.5" text-anchor="middle">virtual nodes:</text>
  <text x="700" y="135" fill="#e7d6ff" font-size="8.5" text-anchor="middle">each shard at many</text>
  <text x="700" y="148" fill="#e7d6ff" font-size="8.5" text-anchor="middle">ring points → even</text>
  <text x="700" y="161" fill="#e7d6ff" font-size="8.5" text-anchor="middle">load + gentle moves</text>

  <text x="700" y="190" fill="#7ee2a8" font-size="9.5" font-weight="700" text-anchor="middle">moves only ~1/N</text>
  <text x="700" y="205" fill="#a8e6c2" font-size="8.5" text-anchor="middle">(the minimum)</text>
  <text x="700" y="224" fill="#a8e6c2" font-size="8.5" text-anchor="middle">→ resharding</text>
  <text x="700" y="237" fill="#a8e6c2" font-size="8.5" text-anchor="middle">becomes feasible</text>
  <text x="700" y="256" fill="#8b98a5" font-size="8.5" text-anchor="middle">(Cassandra/Dynamo</text>
  <text x="700" y="269" fill="#8b98a5" font-size="8.5" text-anchor="middle">rings; Vitess uses</text>
  <text x="700" y="282" fill="#8b98a5" font-size="8.5" text-anchor="middle">keyspace-range splits</text>
  <text x="700" y="295" fill="#8b98a5" font-size="8.5" text-anchor="middle">for the same goal)</text>

  <defs><marker id="p" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8957e5"/></marker></defs>
</svg>
