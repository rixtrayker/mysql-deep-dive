<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="460" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">11.6 · The shard key — the highest-leverage, near-permanent decision</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">it governs FOUR things at once · chosen from the ACCESS PATTERN, not the data model</text>

  <!-- four properties -->
  <rect x="20" y="66" width="186" height="92" rx="9" fill="#11161c" stroke="#1f6feb" stroke-width="1.3"/>
  <text x="113" y="88" fill="#9fd0ff" font-size="11.5" font-weight="700" text-anchor="middle">① CO-LOCATION</text>
  <text x="113" y="108" fill="#cde3ff" font-size="9.5" text-anchor="middle">which rows end up together</text>
  <text x="113" y="124" fill="#cde3ff" font-size="9.5" text-anchor="middle">→ both legs of a transfer</text>
  <text x="113" y="140" fill="#7ee2a8" font-size="9.5" text-anchor="middle">on ONE shard? (11.9)</text>

  <rect x="214" y="66" width="186" height="92" rx="9" fill="#11161c" stroke="#2ea043" stroke-width="1.3"/>
  <text x="307" y="88" fill="#7ee2a8" font-size="11.5" font-weight="700" text-anchor="middle">② ROUTING</text>
  <text x="307" y="108" fill="#a8e6c2" font-size="9.5" text-anchor="middle">filter by shard key</text>
  <text x="307" y="124" fill="#a8e6c2" font-size="9.5" text-anchor="middle">→ ONE shard (fast)</text>
  <text x="307" y="140" fill="#ff7b72" font-size="9.5" text-anchor="middle">else scatter-gather (11.10)</text>

  <rect x="408" y="66" width="186" height="92" rx="9" fill="#11161c" stroke="#d29922" stroke-width="1.3"/>
  <text x="501" y="88" fill="#f0c674" font-size="11.5" font-weight="700" text-anchor="middle">③ EVEN LOAD</text>
  <text x="501" y="108" fill="#f5e6c7" font-size="9.5" text-anchor="middle">spread writes uniformly</text>
  <text x="501" y="124" fill="#ff7b72" font-size="9.5" text-anchor="middle">skewed key → HOTSPOT</text>
  <text x="501" y="140" fill="#f5e6c7" font-size="9.5" text-anchor="middle">(hot account = hot shard)</text>

  <rect x="602" y="66" width="178" height="92" rx="9" fill="#11161c" stroke="#8957e5" stroke-width="1.3"/>
  <text x="691" y="88" fill="#d2a8ff" font-size="11.5" font-weight="700" text-anchor="middle">④ CARDINALITY</text>
  <text x="691" y="108" fill="#e7d6ff" font-size="9.5" text-anchor="middle">enough distinct values</text>
  <text x="691" y="124" fill="#e7d6ff" font-size="9.5" text-anchor="middle">to split finely +</text>
  <text x="691" y="140" fill="#e7d6ff" font-size="9.5" text-anchor="middle">reshard finer later</text>

  <!-- candidate keys comparison -->
  <text x="400" y="186" fill="#e6edf3" font-size="13" font-weight="700" text-anchor="middle">Choosing the payments shard key — the tradeoffs</text>

  <rect x="20" y="200" width="248" height="200" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.5"/>
  <text x="144" y="222" fill="#7ee2a8" font-size="12" font-weight="700" text-anchor="middle">account_id</text>
  <text x="144" y="244" fill="#a8e6c2" font-size="10" text-anchor="middle">✓ co-locates an account's</text>
  <text x="144" y="259" fill="#a8e6c2" font-size="10" text-anchor="middle">entries + balance</text>
  <text x="144" y="277" fill="#a8e6c2" font-size="10" text-anchor="middle">✓ even (many uniform accts)</text>
  <text x="144" y="295" fill="#a8e6c2" font-size="10" text-anchor="middle">✓ single-acct ops 1 shard</text>
  <text x="144" y="319" fill="#ff7b72" font-size="10" text-anchor="middle">✗ transfer = 2 accounts</text>
  <text x="144" y="334" fill="#ff7b72" font-size="10" text-anchor="middle">→ cross-shard unless</text>
  <text x="144" y="349" fill="#ff7b72" font-size="10" text-anchor="middle">they share a shard (11.9)</text>
  <text x="144" y="378" fill="#7ee2a8" font-size="9.5" text-anchor="middle">good for account-centric</text>

  <rect x="276" y="200" width="248" height="200" rx="10" fill="#11161c" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="400" y="222" fill="#9fd0ff" font-size="12" font-weight="700" text-anchor="middle">customer_id / tenant_id</text>
  <text x="400" y="244" fill="#cde3ff" font-size="10" text-anchor="middle">✓ co-locates ALL a customer's</text>
  <text x="400" y="259" fill="#cde3ff" font-size="10" text-anchor="middle">accounts → intra-customer</text>
  <text x="400" y="274" fill="#7ee2a8" font-size="10" text-anchor="middle">transfers SINGLE-SHARD</text>
  <text x="400" y="298" fill="#ff7b72" font-size="10" text-anchor="middle">✗ whale customer = HOTSPOT</text>
  <text x="400" y="316" fill="#ff7b72" font-size="10" text-anchor="middle">✗ cross-customer transfer</text>
  <text x="400" y="331" fill="#ff7b72" font-size="10" text-anchor="middle">→ cross-shard</text>
  <text x="400" y="378" fill="#9fd0ff" font-size="9.5" text-anchor="middle">the usual fintech choice (11.9)</text>

  <rect x="532" y="200" width="248" height="200" rx="10" fill="#11161c" stroke="#da3633" stroke-width="1.5"/>
  <text x="656" y="222" fill="#ff7b72" font-size="12" font-weight="700" text-anchor="middle">transaction_id</text>
  <text x="656" y="244" fill="#f5b7b3" font-size="10" text-anchor="middle">✓ perfectly even spread</text>
  <text x="656" y="269" fill="#ff7b72" font-size="10" text-anchor="middle">✗ co-locates NOTHING</text>
  <text x="656" y="289" fill="#ff7b72" font-size="10" text-anchor="middle">✗ every balance read +</text>
  <text x="656" y="304" fill="#ff7b72" font-size="10" text-anchor="middle">account query scatters</text>
  <text x="656" y="319" fill="#ff7b72" font-size="10" text-anchor="middle">to ALL shards</text>
  <text x="656" y="378" fill="#f5b7b3" font-size="9.5" text-anchor="middle">almost always WRONG</text>

  <text x="400" y="432" fill="#f0c674" font-size="11" text-anchor="middle">⚠ changing the shard key on a live system = re-distribute EVERY row — treat it as PERMANENT (11.14)</text>
  <text x="400" y="450" fill="#8b98a5" font-size="10" text-anchor="middle">rarely a perfect key — choose the least-bad for the DOMINANT access pattern, accept the rest as cross-shard</text>
</svg>
