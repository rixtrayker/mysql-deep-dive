<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="440" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">11.11 · Cross-shard transactions — ACID is a single-node guarantee</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">no single redo log / commit / lock manager spans 2 servers → choose 2PC (blocking) or Saga (eventual) · goal: AVOID</text>

  <!-- single-shard -->
  <rect x="20" y="66" width="245" height="320" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.6"/>
  <text x="142" y="88" fill="#7ee2a8" font-size="12.5" font-weight="700" text-anchor="middle">SINGLE-SHARD (the goal)</text>
  <rect x="55" y="106" width="174" height="150" rx="8" fill="#13361f" stroke="#2ea043"/>
  <text x="142" y="126" fill="#7ee2a8" font-size="10" text-anchor="middle">one InnoDB server</text>
  <rect x="72" y="138" width="140" height="26" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="142" y="155" fill="#cde3ff" font-size="9" text-anchor="middle">BEGIN</text>
  <rect x="72" y="170" width="140" height="26" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="142" y="187" fill="#cde3ff" font-size="9" text-anchor="middle">debit A · credit B</text>
  <rect x="72" y="202" width="140" height="26" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="142" y="219" fill="#cde3ff" font-size="9" text-anchor="middle">COMMIT (one redo log)</text>
  <text x="142" y="246" fill="#7ee2a8" font-size="9" text-anchor="middle">atomic · durable · isolated</text>
  <text x="142" y="284" fill="#a8e6c2" font-size="11" font-weight="700" text-anchor="middle">all M07–M09</text>
  <text x="142" y="302" fill="#a8e6c2" font-size="11" font-weight="700" text-anchor="middle">guarantees FREE</text>
  <text x="142" y="336" fill="#7ee2a8" font-size="10" text-anchor="middle">→ co-locate (11.9) so the</text>
  <text x="142" y="352" fill="#7ee2a8" font-size="10" text-anchor="middle">common transfer is here</text>
  <text x="142" y="372" fill="#8b98a5" font-size="9.5" text-anchor="middle">design for THIS path</text>

  <!-- 2PC -->
  <rect x="278" y="66" width="245" height="320" rx="10" fill="#11161c" stroke="#d29922" stroke-width="1.4"/>
  <text x="400" y="88" fill="#f0c674" font-size="12.5" font-weight="700" text-anchor="middle">2PC / XA (atomic but…)</text>
  <rect x="350" y="104" width="100" height="26" rx="5" fill="#3a2e0a" stroke="#d29922"/><text x="400" y="121" fill="#f0c674" font-size="9" text-anchor="middle">coordinator</text>
  <rect x="300" y="146" width="84" height="24" rx="4" fill="#1b3a5c" stroke="#2f6db5"/><text x="342" y="162" fill="#cde3ff" font-size="8.5" text-anchor="middle">shard 1</text>
  <rect x="416" y="146" width="84" height="24" rx="4" fill="#1b3a5c" stroke="#2f6db5"/><text x="458" y="162" fill="#cde3ff" font-size="8.5" text-anchor="middle">shard 2</text>
  <path d="M380 130 L350 144" stroke="#d29922" stroke-width="1.2" marker-end="url(#a)"/>
  <path d="M420 130 L450 144" stroke="#d29922" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="400" y="190" fill="#f5e6c7" font-size="9" text-anchor="middle">1. PREPARE (both hold locks)</text>
  <text x="400" y="206" fill="#f5e6c7" font-size="9" text-anchor="middle">2. both vote yes → COMMIT</text>
  <text x="400" y="240" fill="#7ee2a8" font-size="9.5" text-anchor="middle">✓ strict atomicity</text>
  <text x="400" y="264" fill="#ff7b72" font-size="9.5" text-anchor="middle">✗ holds locks across network</text>
  <text x="400" y="282" fill="#ff7b72" font-size="9.5" text-anchor="middle">✗ BLOCKING — coordinator</text>
  <text x="400" y="297" fill="#ff7b72" font-size="9.5" text-anchor="middle">crash → shards stuck in-doubt</text>
  <text x="400" y="312" fill="#ff7b72" font-size="9.5" text-anchor="middle">✗ slow, poor throughput</text>
  <text x="400" y="348" fill="#f5e6c7" font-size="10" text-anchor="middle">widely AVOIDED in fintech</text>
  <text x="400" y="368" fill="#8b98a5" font-size="9" text-anchor="middle">(detail → M12)</text>

  <!-- Saga -->
  <rect x="536" y="66" width="245" height="320" rx="10" fill="#11161c" stroke="#8957e5" stroke-width="1.5"/>
  <text x="658" y="88" fill="#d2a8ff" font-size="12.5" font-weight="700" text-anchor="middle">SAGA (the usual choice)</text>
  <rect x="556" y="106" width="204" height="26" rx="5" fill="#2d2150" stroke="#8957e5"/><text x="658" y="123" fill="#e7d6ff" font-size="9" text-anchor="middle">local txn: debit A (shard 1) ✓</text>
  <text x="658" y="146" fill="#cdb4ff" font-size="14" text-anchor="middle">↓</text>
  <rect x="556" y="152" width="204" height="26" rx="5" fill="#2d2150" stroke="#8957e5"/><text x="658" y="169" fill="#e7d6ff" font-size="9" text-anchor="middle">local txn: credit B (shard 2) ✓</text>
  <text x="658" y="192" fill="#cdb4ff" font-size="14" text-anchor="middle">↓</text>
  <rect x="556" y="198" width="204" height="26" rx="5" fill="#3a1410" stroke="#da3633"/><text x="658" y="215" fill="#f5b7b3" font-size="9" text-anchor="middle">on failure → COMPENSATE (re-credit A)</text>
  <text x="658" y="248" fill="#7ee2a8" font-size="9.5" text-anchor="middle">✓ each txn single-shard</text>
  <text x="658" y="266" fill="#7ee2a8" font-size="9.5" text-anchor="middle">✓ non-blocking, scalable</text>
  <text x="658" y="290" fill="#ff7b72" font-size="9.5" text-anchor="middle">✗ eventually consistent</text>
  <text x="658" y="305" fill="#ff7b72" font-size="9.5" text-anchor="middle">  (brief in-flight state)</text>
  <text x="658" y="320" fill="#ff7b72" font-size="9.5" text-anchor="middle">✗ compensations + idempotency</text>
  <text x="658" y="352" fill="#cdb4ff" font-size="10" text-anchor="middle">+ idempotency keys (M16)</text>
  <text x="658" y="370" fill="#cdb4ff" font-size="10" text-anchor="middle">+ reconciliation (M02/2.17)</text>

  <text x="400" y="418" fill="#f0c674" font-size="11.5" font-weight="700" text-anchor="middle">don't do cross-shard txns WELL — design (co-location) to AVOID them · the bridge into M12</text>

  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#d29922"/></marker></defs>
</svg>
