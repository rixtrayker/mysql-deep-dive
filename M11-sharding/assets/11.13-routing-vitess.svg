<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="420" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">11.13 · The routing layer — app sees ONE database, Vitess shards underneath</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">vtgate routes by shard key (VSchema/vindex) · single-shard → one shard · non-key → scatter-gather + merge</text>

  <!-- app -->
  <rect x="320" y="66" width="160" height="38" rx="8" fill="#1b3a5c" stroke="#2f6db5" stroke-width="1.4"/>
  <text x="400" y="84" fill="#cde3ff" font-size="11" font-weight="700" text-anchor="middle">APPLICATION</text>
  <text x="400" y="98" fill="#9fd0ff" font-size="9" text-anchor="middle">issues near-normal SQL</text>

  <!-- vtgate -->
  <rect x="280" y="128" width="240" height="64" rx="9" fill="#11161c" stroke="#1f6feb" stroke-width="1.6"/>
  <text x="400" y="148" fill="#9fd0ff" font-size="11.5" font-weight="700" text-anchor="middle">vtgate (router)</text>
  <text x="400" y="166" fill="#cde3ff" font-size="9" text-anchor="middle">parse → consult VSchema/vindex</text>
  <text x="400" y="182" fill="#cde3ff" font-size="9" text-anchor="middle">→ route + merge results</text>
  <path d="M400 104 L400 126" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- single-shard path -->
  <text x="200" y="218" fill="#7ee2a8" font-size="10.5" font-weight="700" text-anchor="middle">keyed query (shard key present)</text>
  <path d="M340 192 L235 232" stroke="#2ea043" stroke-width="1.5" marker-end="url(#g)"/>
  <text x="250" y="232" fill="#a8e6c2" font-size="9" text-anchor="middle">→ ONE shard (fast, ACID)</text>

  <!-- scatter path -->
  <text x="600" y="218" fill="#ff7b72" font-size="10.5" font-weight="700" text-anchor="middle">non-key query</text>
  <path d="M460 192 L600 232" stroke="#da3633" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#r)"/>
  <text x="600" y="232" fill="#f5b7b3" font-size="9" text-anchor="middle">→ scatter to ALL + merge (slow)</text>

  <!-- shards row -->
  <g>
    <rect x="60" y="250" width="150" height="110" rx="9" fill="#13361f" stroke="#2ea043" stroke-width="1.3"/>
    <text x="135" y="270" fill="#7ee2a8" font-size="10" font-weight="700" text-anchor="middle">SHARD 1</text>
    <text x="135" y="288" fill="#a8e6c2" font-size="8.5" text-anchor="middle">vttablet sidecar</text>
    <rect x="78" y="298" width="114" height="22" rx="4" fill="#1b3a5c" stroke="#2f6db5"/><text x="135" y="313" fill="#cde3ff" font-size="8" text-anchor="middle">MySQL primary</text>
    <rect x="78" y="324" width="54" height="20" rx="4" fill="#2d2150" stroke="#8957e5"/><text x="105" y="338" fill="#d2a8ff" font-size="7.5" text-anchor="middle">replica</text>
    <rect x="138" y="324" width="54" height="20" rx="4" fill="#2d2150" stroke="#8957e5"/><text x="165" y="338" fill="#d2a8ff" font-size="7.5" text-anchor="middle">replica</text>
  </g>
  <g>
    <rect x="325" y="250" width="150" height="110" rx="9" fill="#13361f" stroke="#2ea043" stroke-width="1.3"/>
    <text x="400" y="270" fill="#7ee2a8" font-size="10" font-weight="700" text-anchor="middle">SHARD 2</text>
    <text x="400" y="288" fill="#a8e6c2" font-size="8.5" text-anchor="middle">vttablet sidecar</text>
    <rect x="343" y="298" width="114" height="22" rx="4" fill="#1b3a5c" stroke="#2f6db5"/><text x="400" y="313" fill="#cde3ff" font-size="8" text-anchor="middle">MySQL primary</text>
    <rect x="343" y="324" width="54" height="20" rx="4" fill="#2d2150" stroke="#8957e5"/><text x="370" y="338" fill="#d2a8ff" font-size="7.5" text-anchor="middle">replica</text>
    <rect x="403" y="324" width="54" height="20" rx="4" fill="#2d2150" stroke="#8957e5"/><text x="430" y="338" fill="#d2a8ff" font-size="7.5" text-anchor="middle">replica</text>
  </g>
  <g>
    <rect x="590" y="250" width="150" height="110" rx="9" fill="#13361f" stroke="#2ea043" stroke-width="1.3"/>
    <text x="665" y="270" fill="#7ee2a8" font-size="10" font-weight="700" text-anchor="middle">SHARD 3</text>
    <text x="665" y="288" fill="#a8e6c2" font-size="8.5" text-anchor="middle">vttablet sidecar</text>
    <rect x="608" y="298" width="114" height="22" rx="4" fill="#1b3a5c" stroke="#2f6db5"/><text x="665" y="313" fill="#cde3ff" font-size="8" text-anchor="middle">MySQL primary</text>
    <rect x="608" y="324" width="54" height="20" rx="4" fill="#2d2150" stroke="#8957e5"/><text x="635" y="338" fill="#d2a8ff" font-size="7.5" text-anchor="middle">replica</text>
    <rect x="668" y="324" width="54" height="20" rx="4" fill="#2d2150" stroke="#8957e5"/><text x="695" y="338" fill="#d2a8ff" font-size="7.5" text-anchor="middle">replica</text>
  </g>

  <path d="M225 244 L135 248" stroke="#2ea043" stroke-width="1.3" marker-end="url(#g)"/>
  <path d="M600 244 Q500 246 410 248" stroke="#da3633" stroke-width="1" stroke-dasharray="3 3" fill="none"/>
  <path d="M600 244 L665 248" stroke="#da3633" stroke-width="1" stroke-dasharray="3 3" fill="none"/>
  <path d="M600 244 L135 248" stroke="#da3633" stroke-width="1" stroke-dasharray="3 3" fill="none"/>

  <text x="400" y="384" fill="#cdb4ff" font-size="10" text-anchor="middle">Vitess also: sequences (global IDs 11.12) · reference tables (replicated to all shards 11.9) · Reshard/VDiff (live resharding 11.14)</text>
  <text x="400" y="404" fill="#8b98a5" font-size="10" text-anchor="middle">alt: app-level routing (DIY shard map — control, but owns all complexity incl. resharding) · ProxySQL (split/route, not full sharding)</text>

  <defs>
    <marker id="b" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#58a6ff"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2ea043"/></marker>
    <marker id="r" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#da3633"/></marker>
  </defs>
</svg>
