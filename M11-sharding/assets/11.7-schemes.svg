<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="420" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">11.7 · Sharding schemes — range vs hash vs directory</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">order-locality vs even-distribution vs flexibility — the same tradeoff as the partition function (11.3)</text>

  <!-- RANGE -->
  <rect x="20" y="66" width="245" height="312" rx="10" fill="#11161c" stroke="#d29922" stroke-width="1.4"/>
  <text x="142" y="88" fill="#f0c674" font-size="12.5" font-weight="700" text-anchor="middle">RANGE</text>
  <text x="142" y="106" fill="#8b98a5" font-size="10" text-anchor="middle">shards own ordered ranges</text>
  <rect x="40" y="120" width="90" height="26" rx="5" fill="#3a2e0a" stroke="#d29922"/><text x="85" y="137" fill="#f0c674" font-size="9" text-anchor="middle">acct 0–1M → S1</text>
  <rect x="40" y="152" width="90" height="26" rx="5" fill="#3a2e0a" stroke="#d29922"/><text x="85" y="169" fill="#f0c674" font-size="9" text-anchor="middle">1M–2M → S2</text>
  <rect x="40" y="184" width="90" height="26" rx="5" fill="#3a2e0a" stroke="#d29922"/><text x="85" y="201" fill="#f0c674" font-size="9" text-anchor="middle">2M–3M → S3</text>
  <rect x="148" y="152" width="100" height="58" rx="6" fill="#3a1410" stroke="#da3633"/><text x="198" y="172" fill="#ff7b72" font-size="9" text-anchor="middle">newest accts</text><text x="198" y="187" fill="#ff7b72" font-size="9" text-anchor="middle">all → last shard</text><text x="198" y="202" fill="#ff7b72" font-size="9" text-anchor="middle">= HOTSPOT</text>
  <text x="142" y="246" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ range queries route</text>
  <text x="142" y="264" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ split = split one range</text>
  <text x="142" y="288" fill="#ff7b72" font-size="10" text-anchor="middle">✗ sequential keys hotspot</text>
  <text x="142" y="306" fill="#ff7b72" font-size="10" text-anchor="middle">✗ uneven shard sizes</text>
  <text x="142" y="338" fill="#f5e6c7" font-size="9.5" text-anchor="middle">good for range-scanned keys</text>
  <text x="142" y="360" fill="#8b98a5" font-size="9" text-anchor="middle">bad on monotonic IDs</text>

  <!-- HASH -->
  <rect x="278" y="66" width="245" height="312" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.4"/>
  <text x="400" y="88" fill="#7ee2a8" font-size="12.5" font-weight="700" text-anchor="middle">HASH</text>
  <text x="400" y="106" fill="#8b98a5" font-size="10" text-anchor="middle">shard = hash(key) → spread</text>
  <rect x="300" y="120" width="90" height="26" rx="5" fill="#13361f" stroke="#2ea043"/><text x="345" y="137" fill="#7ee2a8" font-size="9" text-anchor="middle">acct 7 → S2</text>
  <rect x="410" y="120" width="90" height="26" rx="5" fill="#13361f" stroke="#2ea043"/><text x="455" y="137" fill="#7ee2a8" font-size="9" text-anchor="middle">acct 8 → S1</text>
  <rect x="300" y="152" width="90" height="26" rx="5" fill="#13361f" stroke="#2ea043"/><text x="345" y="169" fill="#7ee2a8" font-size="9" text-anchor="middle">acct 9 → S3</text>
  <rect x="410" y="152" width="90" height="26" rx="5" fill="#13361f" stroke="#2ea043"/><text x="455" y="169" fill="#7ee2a8" font-size="9" text-anchor="middle">acct 10 → S2</text>
  <text x="400" y="200" fill="#a8e6c2" font-size="9.5" text-anchor="middle">even regardless of key shape</text>
  <text x="400" y="246" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ even load (skew-proof)</text>
  <text x="400" y="264" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ no sequential hotspot</text>
  <text x="400" y="288" fill="#ff7b72" font-size="10" text-anchor="middle">✗ NO range queries (scatter)</text>
  <text x="400" y="306" fill="#ff7b72" font-size="10" text-anchor="middle">✗ naive mod N reshards badly</text>
  <text x="400" y="338" fill="#f5e6c7" font-size="9.5" text-anchor="middle">→ use CONSISTENT HASHING (11.8)</text>
  <text x="400" y="360" fill="#8b98a5" font-size="9" text-anchor="middle">the common production choice</text>

  <!-- DIRECTORY -->
  <rect x="536" y="66" width="245" height="312" rx="10" fill="#11161c" stroke="#1f6feb" stroke-width="1.4"/>
  <text x="658" y="88" fill="#9fd0ff" font-size="12.5" font-weight="700" text-anchor="middle">DIRECTORY (lookup)</text>
  <text x="658" y="106" fill="#8b98a5" font-size="10" text-anchor="middle">explicit key → shard map</text>
  <rect x="585" y="122" width="146" height="78" rx="6" fill="#1b3a5c" stroke="#2f6db5"/>
  <text x="658" y="140" fill="#cde3ff" font-size="9" text-anchor="middle">LOOKUP TABLE</text>
  <text x="658" y="157" fill="#9fd0ff" font-size="9" text-anchor="middle">acct 7 → S2</text>
  <text x="658" y="172" fill="#9fd0ff" font-size="9" text-anchor="middle">acct 42 → S1 (moved!)</text>
  <text x="658" y="187" fill="#9fd0ff" font-size="9" text-anchor="middle">whale acct → S4 (dedicated)</text>
  <text x="658" y="246" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ move any key anytime</text>
  <text x="658" y="264" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ rebalance hotspots</text>
  <text x="658" y="282" fill="#7ee2a8" font-size="10" text-anchor="middle">✓ incremental reshard</text>
  <text x="658" y="306" fill="#ff7b72" font-size="10" text-anchor="middle">✗ lookup indirection +</text>
  <text x="658" y="321" fill="#ff7b72" font-size="10" text-anchor="middle">directory = critical SPOF</text>
  <text x="658" y="352" fill="#cde3ff" font-size="9.5" text-anchor="middle">(usually bucketed + cached/HA)</text>

  <text x="400" y="404" fill="#8b98a5" font-size="10.5" text-anchor="middle">most large systems: HASH the key (skew-proof) then RANGE-partition the hash space → Vitess (even spread + reshardable, 11.8/11.13)</text>
</svg>
