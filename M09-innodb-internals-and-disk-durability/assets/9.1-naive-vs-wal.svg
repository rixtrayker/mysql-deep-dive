<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="420" fill="#0f1419"/>
  <text x="400" y="30" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">9.1 · Why WAL — log the change sequentially, write pages lazily</text>
  <text x="400" y="50" fill="#8b98a5" font-size="12" text-anchor="middle">durability needs the change on disk at commit; flushing scattered data pages per commit is too slow</text>

  <!-- NAIVE (left) -->
  <rect x="30" y="74" width="350" height="300" rx="10" fill="#11161c" stroke="#da3633" stroke-width="1.5"/>
  <text x="205" y="96" fill="#ff7b72" font-size="13" font-weight="700" text-anchor="middle">✗ NAIVE — flush data pages on commit</text>
  <rect x="50" y="110" width="310" height="30" rx="5" fill="#1b3a5c" stroke="#2f6db5"/>
  <text x="62" y="130" fill="#cde3ff" font-size="11">COMMIT: write every dirty 16KB page to its real home</text>
  <g font-size="10" text-anchor="middle">
    <rect x="60" y="152" width="70" height="34" rx="4" fill="#3a1a1a" stroke="#da3633"/><text x="95" y="173" fill="#f5c2c0">page @ 0x9F</text>
    <rect x="150" y="152" width="70" height="34" rx="4" fill="#3a1a1a" stroke="#da3633"/><text x="185" y="173" fill="#f5c2c0">page @ 0x2A</text>
    <rect x="240" y="152" width="70" height="34" rx="4" fill="#3a1a1a" stroke="#da3633"/><text x="275" y="173" fill="#f5c2c0">page @ 0xC1</text>
  </g>
  <text x="205" y="208" fill="#ff7b72" font-size="11" text-anchor="middle">scattered → RANDOM I/O (slowest thing storage does)</text>
  <text x="205" y="228" fill="#f5c2c0" font-size="11" text-anchor="middle">+ writes whole 16KB pages for tiny changes</text>
  <rect x="50" y="246" width="310" height="110" rx="6" fill="#2d1a1a" stroke="#da3633"/>
  <text x="205" y="268" fill="#ff7b72" font-size="11.5" font-weight="600" text-anchor="middle">→ commits = a STORM of random writes</text>
  <text x="205" y="290" fill="#f5c2c0" font-size="11" text-anchor="middle">unusably slow (or skip flushing = not durable)</text>
  <text x="205" y="320" fill="#8b98a5" font-size="10.5" text-anchor="middle">commit rate capped at random-write speed</text>
  <text x="205" y="340" fill="#8b98a5" font-size="10.5" text-anchor="middle">no way to be fast AND durable</text>

  <!-- WAL (right) -->
  <rect x="420" y="74" width="350" height="300" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.6"/>
  <text x="595" y="96" fill="#7ee2a8" font-size="13" font-weight="700" text-anchor="middle">✓ WAL — log sequentially, flush pages later</text>
  <rect x="440" y="110" width="310" height="48" rx="5" fill="#143a2a" stroke="#2ea043"/>
  <text x="452" y="128" fill="#c7f5d9" font-size="11">COMMIT: append change to REDO LOG (sequential) + fsync</text>
  <text x="452" y="146" fill="#7ee2a8" font-size="11">→ ONE fast sequential write → durable, COMMIT returns ✓</text>
  <g font-size="10" text-anchor="middle">
    <rect x="440" y="168" width="310" height="26" rx="4" fill="#13361f" stroke="#2ea043"/>
    <text x="595" y="185" fill="#a8e6c2">redo: [P9F:Δ][P2A:Δ][PC1:Δ] → → → (append-only)</text>
  </g>
  <text x="595" y="216" fill="#7ee2a8" font-size="11" text-anchor="middle">data pages stay DIRTY in the buffer pool (9.2)</text>
  <text x="595" y="236" fill="#a8e6c2" font-size="11" text-anchor="middle">→ flushed to real homes LATER, batched, in background</text>
  <rect x="440" y="252" width="310" height="104" rx="6" fill="#13361f" stroke="#2ea043"/>
  <text x="595" y="274" fill="#7ee2a8" font-size="11.5" font-weight="600" text-anchor="middle">FAST (1 sequential fsync) AND durable</text>
  <text x="595" y="296" fill="#a8e6c2" font-size="11" text-anchor="middle">crash before page flush? → recovery REPLAYS redo (9.14)</text>
  <text x="595" y="320" fill="#a8e6c2" font-size="10.5" text-anchor="middle">log-first (durable) · pages-later (lazy)</text>
  <text x="595" y="340" fill="#f0c674" font-size="10.5" text-anchor="middle">universal: journals · Kafka · Raft · event sourcing</text>

  <text x="400" y="402" fill="#58a6ff" font-size="11.5" text-anchor="middle" font-weight="600">sequential writes are cheap + a log is replayable → log-then-apply gives durability without per-commit random-write cost</text>
</svg>
