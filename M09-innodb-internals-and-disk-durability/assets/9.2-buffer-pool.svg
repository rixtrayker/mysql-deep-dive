<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="460" fill="#0f1419"/>
  <text x="400" y="30" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">9.2 · The buffer pool — cache pages in RAM, serve most accesses without disk</text>
  <text x="400" y="50" fill="#8b98a5" font-size="12" text-anchor="middle">LRU split into young/old (scan resistance) · dirty pages flushed lazily · change buffer for secondary indexes</text>

  <!-- buffer pool box -->
  <rect x="30" y="72" width="520" height="280" rx="10" fill="#11161c" stroke="#1f6feb" stroke-width="1.6"/>
  <text x="290" y="94" fill="#9fd0ff" font-size="13" font-weight="700" text-anchor="middle">BUFFER POOL (RAM, innodb_buffer_pool_size)</text>

  <!-- LRU young sublist -->
  <rect x="48" y="108" width="484" height="74" rx="8" fill="#143a2a" stroke="#2ea043" stroke-width="1.4"/>
  <text x="62" y="128" fill="#7ee2a8" font-size="12" font-weight="600">YOUNG (new) sublist — the HOT working set</text>
  <g font-size="10" text-anchor="middle">
    <rect x="62" y="138" width="80" height="34" rx="4" fill="#13361f" stroke="#2ea043"/><text x="102" y="159" fill="#a8e6c2">acct 42 ★</text>
    <rect x="152" y="138" width="80" height="34" rx="4" fill="#13361f" stroke="#2ea043"/><text x="192" y="159" fill="#a8e6c2">PK root</text>
    <rect x="242" y="138" width="80" height="34" rx="4" fill="#3a2a14" stroke="#d29922"/><text x="282" y="153" fill="#f0c674">acct 7</text><text x="282" y="167" fill="#f0c674">DIRTY</text>
    <rect x="332" y="138" width="80" height="34" rx="4" fill="#13361f" stroke="#2ea043"/><text x="372" y="159" fill="#a8e6c2">idx page</text>
  </g>
  <text x="500" y="159" fill="#8b98a5" font-size="9" text-anchor="middle">promoted on<br/>re-access</text>

  <!-- LRU old sublist -->
  <rect x="48" y="190" width="484" height="74" rx="8" fill="#1b3a5c" stroke="#2f6db5" stroke-width="1.3"/>
  <text x="62" y="210" fill="#9fd0ff" font-size="12" font-weight="600">OLD sublist — newly read / scan pages (evict from here)</text>
  <g font-size="10" text-anchor="middle">
    <rect x="62" y="220" width="80" height="34" rx="4" fill="#11243a" stroke="#2f6db5"/><text x="102" y="241" fill="#9fd0ff">scan pg</text>
    <rect x="152" y="220" width="80" height="34" rx="4" fill="#11243a" stroke="#2f6db5"/><text x="192" y="241" fill="#9fd0ff">scan pg</text>
    <rect x="242" y="220" width="80" height="34" rx="4" fill="#11243a" stroke="#2f6db5"/><text x="282" y="241" fill="#9fd0ff">scan pg</text>
  </g>
  <text x="430" y="241" fill="#f0c674" font-size="9.5" text-anchor="middle">one-time scan → evicted</text>
  <text x="290" y="280" fill="#a8e6c2" font-size="10.5" text-anchor="middle">scan resistance: a big scan reads pages ONCE → they enter OLD → evicted without polluting the hot YOUNG set</text>

  <!-- change buffer + flush -->
  <rect x="48" y="294" width="234" height="48" rx="6" fill="#2d2150" stroke="#8957e5"/>
  <text x="165" y="312" fill="#d2a8ff" font-size="11" font-weight="600" text-anchor="middle">CHANGE BUFFER (9.13)</text>
  <text x="165" y="330" fill="#cdb4ff" font-size="9.5" text-anchor="middle">defer/batch secondary-index writes (page not in pool)</text>
  <rect x="298" y="294" width="234" height="48" rx="6" fill="#3a2a14" stroke="#d29922"/>
  <text x="415" y="312" fill="#f0c674" font-size="11" font-weight="600" text-anchor="middle">FLUSH LIST → disk (lazy, 9.6)</text>
  <text x="415" y="330" fill="#f5e6c7" font-size="9.5" text-anchor="middle">dirty pages flushed in background (oldest LSN first)</text>

  <!-- disk -->
  <rect x="590" y="150" width="180" height="120" rx="10" fill="#11161c" stroke="#30363d"/>
  <text x="680" y="172" fill="#8b98a5" font-size="12" font-weight="600" text-anchor="middle">DISK</text>
  <text x="680" y="194" fill="#6e7681" font-size="10" text-anchor="middle">tablespace .ibd files</text>
  <text x="680" y="212" fill="#6e7681" font-size="10" text-anchor="middle">(pages, 9.3)</text>
  <text x="680" y="240" fill="#6e7681" font-size="10" text-anchor="middle">~100,000× slower</text>
  <text x="680" y="256" fill="#6e7681" font-size="10" text-anchor="middle">than RAM</text>
  <path d="M555,200 L588,200" stroke="#2f6db5" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="572" y="192" fill="#8b98a5" font-size="9" text-anchor="middle">miss</text>
  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2f6db5"/></marker></defs>

  <!-- takeaway -->
  <rect x="30" y="364" width="740" height="80" rx="8" fill="#11161c" stroke="#30363d"/>
  <text x="400" y="386" fill="#e6edf3" font-size="12.5" font-weight="700" text-anchor="middle">the HIT RATE is the #1 InnoDB health metric</text>
  <text x="50" y="408" fill="#7ee2a8" font-size="11">● size the buffer pool to hold your WORKING SET (often 50–75% of RAM on a dedicated server) → most reads/writes hit RAM</text>
  <text x="50" y="428" fill="#9fd0ff" font-size="11">● this is WHY compact rows/keys matter (M03/3.2) — smaller data → more fits → higher hit rate. Caches PAGES, not results (≠ the removed query cache)</text>
</svg>
