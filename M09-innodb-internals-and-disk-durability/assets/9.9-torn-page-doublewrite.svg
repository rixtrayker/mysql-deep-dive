<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="450" fill="#0f1419"/>
  <text x="400" y="30" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">9.9 · Torn page writes &amp; the doublewrite buffer</text>
  <text x="400" y="50" fill="#8b98a5" font-size="12" text-anchor="middle">a 16KB write isn't atomic at the hardware level — a crash mid-write CORRUPTS the page (redo can't fix this)</text>

  <!-- the hazard -->
  <text x="200" y="84" fill="#ff7b72" font-size="13" font-weight="700" text-anchor="middle">✗ THE HAZARD — a torn page</text>
  <text x="200" y="104" fill="#f5c2c0" font-size="10.5" text-anchor="middle">device writes 16KB as smaller sectors (512B / 4KB)</text>
  <rect x="60" y="116" width="280" height="56" rx="6" fill="#11161c" stroke="#30363d"/>
  <g font-size="9.5" text-anchor="middle">
    <rect x="70" y="126" width="60" height="36" rx="3" fill="#13361f" stroke="#2ea043"/><text x="100" y="142" fill="#a8e6c2">NEW</text><text x="100" y="155" fill="#a8e6c2">sector</text>
    <rect x="135" y="126" width="60" height="36" rx="3" fill="#13361f" stroke="#2ea043"/><text x="165" y="142" fill="#a8e6c2">NEW</text><text x="165" y="155" fill="#a8e6c2">sector</text>
    <rect x="200" y="126" width="60" height="36" rx="3" fill="#3a1a1a" stroke="#da3633"/><text x="230" y="142" fill="#f5c2c0">OLD</text><text x="230" y="155" fill="#f5c2c0">💥crash</text>
    <rect x="265" y="126" width="60" height="36" rx="3" fill="#3a1a1a" stroke="#da3633"/><text x="295" y="142" fill="#f5c2c0">OLD</text><text x="295" y="155" fill="#f5c2c0">sector</text>
  </g>
  <text x="200" y="190" fill="#ff7b72" font-size="11" text-anchor="middle">half new + half old = CORRUPT (bad checksum)</text>
  <rect x="60" y="202" width="280" height="56" rx="6" fill="#2d1a1a" stroke="#da3633"/>
  <text x="200" y="222" fill="#ff7b72" font-size="11" font-weight="600" text-anchor="middle">redo log CAN'T fix it (9.4)</text>
  <text x="200" y="240" fill="#f5c2c0" font-size="10" text-anchor="middle">redo = "apply Δ to a VALID page", not "rebuild a torn one"</text>
  <text x="200" y="252" fill="#f5c2c0" font-size="10" text-anchor="middle">→ silent corruption (worse than data LOSS)</text>

  <!-- the fix -->
  <text x="595" y="84" fill="#7ee2a8" font-size="13" font-weight="700" text-anchor="middle">✓ THE FIX — doublewrite buffer</text>
  <text x="595" y="104" fill="#a8e6c2" font-size="10.5" text-anchor="middle">write every page TWICE → an intact copy always exists</text>
  <rect x="430" y="116" width="330" height="40" rx="6" fill="#143a2a" stroke="#2ea043"/>
  <text x="445" y="134" fill="#c7f5d9" font-size="11">1 · write page to DOUBLEWRITE area (sequential) + fsync</text>
  <text x="445" y="149" fill="#a8e6c2" font-size="10">(batched, cheap sequential I/O)</text>
  <rect x="430" y="162" width="330" height="34" rx="6" fill="#143a2a" stroke="#2ea043"/>
  <text x="445" y="183" fill="#c7f5d9" font-size="11">2 · THEN write page to its real (scattered) home</text>
  <path d="M595,156 L595,162" stroke="#2ea043" stroke-width="2" fill="none"/>
  <rect x="430" y="202" width="330" height="56" rx="6" fill="#13361f" stroke="#2ea043" stroke-width="1.4"/>
  <text x="595" y="222" fill="#7ee2a8" font-size="11" font-weight="600" text-anchor="middle">on recovery: bad checksum detected?</text>
  <text x="595" y="240" fill="#a8e6c2" font-size="10.5" text-anchor="middle">→ restore the INTACT copy from the doublewrite area ✓</text>
  <text x="595" y="252" fill="#a8e6c2" font-size="10" text-anchor="middle">torn home-write always recoverable</text>

  <!-- takeaways -->
  <rect x="30" y="282" width="740" height="150" rx="8" fill="#11161c" stroke="#30363d"/>
  <text x="400" y="304" fill="#e6edf3" font-size="12.5" font-weight="700" text-anchor="middle">durability (replay a log) and torn-write protection (write twice) are DIFFERENT guarantees</text>
  <text x="50" y="328" fill="#9fd0ff" font-size="11">● WAL gives durability but assumes ATOMIC page writes — it can't reconstruct a half-written page</text>
  <text x="50" y="350" fill="#7ee2a8" font-size="11">● doublewrite fills exactly that gap: "an intact copy exists somewhere" → torn write always repairable</text>
  <text x="50" y="372" fill="#f0c674" font-size="11">● cost: data pages written twice (sequential dblwr area → modest) · keep innodb_doublewrite=ON (the safe default)</text>
  <text x="50" y="394" fill="#d2a8ff" font-size="11">● safe to DISABLE only with verified ATOMIC-write storage (some NVMe / ZFS) — else you've removed torn-page protection</text>
  <text x="50" y="416" fill="#8b98a5" font-size="10.5">universal write-twice-for-atomicity pattern (filesystem data journaling, copy-on-write) · "I have a WAL" ≠ "safe from all crash corruption"</text>
</svg>
