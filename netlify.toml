# Netlify build config — builds the static site from source on each push.
[build]
  base    = "site"
  command = "node build.js"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Long-cache the immutable SVG/diagram assets.
[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
