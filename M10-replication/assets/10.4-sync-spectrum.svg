<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="440" fill="#0f1419"/>
  <text x="400" y="30" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">10.4 · The sync spectrum — how long does the source WAIT before commit returns?</text>
  <text x="400" y="50" fill="#8b98a5" font-size="12" text-anchor="middle">the consistency/durability vs latency dial · the universal replication-acknowledgment question</text>

  <!-- ASYNC -->
  <rect x="30" y="74" width="240" height="300" rx="10" fill="#11161c" stroke="#da3633" stroke-width="1.5"/>
  <text x="150" y="96" fill="#ff7b72" font-size="13" font-weight="700" text-anchor="middle">ASYNC (default)</text>
  <text x="150" y="114" fill="#f5c2c0" font-size="10.5" text-anchor="middle">don't wait at all</text>
  <rect x="46" y="126" width="208" height="80" rx="6" fill="#3a1a1a" stroke="#da3633"/>
  <text x="60" y="146" fill="#f5c2c0" font-size="10.5">commit locally → return immediately</text>
  <text x="60" y="164" fill="#f5c2c0" font-size="10.5">binlog ships in the BACKGROUND</text>
  <text x="60" y="184" fill="#ff7b72" font-size="10.5" font-weight="600">replicas LAG (10.5)</text>
  <text x="150" y="232" fill="#7ee2a8" font-size="11.5" font-weight="600" text-anchor="middle">⬆ fastest, highest throughput</text>
  <text x="150" y="256" fill="#ff7b72" font-size="11" text-anchor="middle">✗ source crash before a replica</text>
  <text x="150" y="272" fill="#f5c2c0" font-size="11" text-anchor="middle">received it → those txns LOST</text>
  <text x="150" y="288" fill="#f5c2c0" font-size="10" text-anchor="middle">(promote-before-apply window, 10.10)</text>
  <rect x="46" y="306" width="208" height="56" rx="6" fill="#2d1a1a" stroke="#da3633"/>
  <text x="150" y="326" fill="#ff7b72" font-size="10.5" text-anchor="middle">loss window = the replica's LAG</text>
  <text x="150" y="344" fill="#f5c2c0" font-size="10" text-anchor="middle">for: loss-tolerant data</text>

  <!-- SEMI-SYNC -->
  <rect x="280" y="74" width="240" height="300" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.8"/>
  <text x="400" y="96" fill="#7ee2a8" font-size="13" font-weight="700" text-anchor="middle">SEMI-SYNC 💰</text>
  <text x="400" y="114" fill="#a8e6c2" font-size="10.5" text-anchor="middle">wait for a replica to RECEIVE</text>
  <rect x="296" y="126" width="208" height="80" rx="6" fill="#143a2a" stroke="#2ea043"/>
  <text x="310" y="146" fill="#c7f5d9" font-size="10.5">commit → wait for ≥1 replica to</text>
  <text x="310" y="164" fill="#c7f5d9" font-size="10.5">ACK receipt → THEN return</text>
  <text x="310" y="184" fill="#7ee2a8" font-size="10.5" font-weight="600">txn durable on ≥1 OTHER node</text>
  <text x="400" y="232" fill="#7ee2a8" font-size="11.5" font-weight="600" text-anchor="middle">✓ survives total SOURCE-NODE loss</text>
  <text x="400" y="252" fill="#a8e6c2" font-size="10.5" text-anchor="middle">(extends M09 durability beyond</text>
  <text x="400" y="266" fill="#a8e6c2" font-size="10.5" text-anchor="middle">one node — node/disk/DC loss)</text>
  <text x="400" y="288" fill="#f0c674" font-size="10.5" text-anchor="middle">◻ cost: +1 network round-trip/commit</text>
  <rect x="296" y="306" width="208" height="56" rx="6" fill="#3a2a14" stroke="#d29922"/>
  <text x="400" y="324" fill="#f0c674" font-size="10" text-anchor="middle">⚠ SILENTLY degrades to async on</text>
  <text x="400" y="338" fill="#f5e6c7" font-size="10" text-anchor="middle">timeout (10.12) — MONITOR status!</text>
  <text x="400" y="354" fill="#7ee2a8" font-size="10" text-anchor="middle">→ typical FINTECH choice</text>

  <!-- SYNC / GROUP -->
  <rect x="530" y="74" width="240" height="300" rx="10" fill="#11161c" stroke="#8957e5" stroke-width="1.6"/>
  <text x="650" y="96" fill="#d2a8ff" font-size="13" font-weight="700" text-anchor="middle">SYNC / GROUP REPL.</text>
  <text x="650" y="114" fill="#cdb4ff" font-size="10.5" text-anchor="middle">wait for majority to AGREE</text>
  <rect x="546" y="126" width="208" height="80" rx="6" fill="#2d2150" stroke="#8957e5"/>
  <text x="560" y="146" fill="#e7d6ff" font-size="10.5">consensus (Paxos-based) — a txn</text>
  <text x="560" y="164" fill="#e7d6ff" font-size="10.5">is CERTIFIED by a majority</text>
  <text x="560" y="184" fill="#d2a8ff" font-size="10.5" font-weight="600">before commit (InnoDB Cluster)</text>
  <text x="650" y="232" fill="#7ee2a8" font-size="11.5" font-weight="600" text-anchor="middle">✓ strongest consistency</text>
  <text x="650" y="252" fill="#a8e6c2" font-size="10.5" text-anchor="middle">no divergence · auto-failover ·</text>
  <text x="650" y="266" fill="#a8e6c2" font-size="10.5" text-anchor="middle">structural split-brain prevention (10.11)</text>
  <text x="650" y="288" fill="#ff7b72" font-size="10.5" text-anchor="middle">✗ most latency / coordination</text>
  <rect x="546" y="306" width="208" height="56" rx="6" fill="#1f1838" stroke="#6e40c9"/>
  <text x="650" y="326" fill="#cdb4ff" font-size="10" text-anchor="middle">throughput capped by majority</text>
  <text x="650" y="344" fill="#cdb4ff" font-size="10" text-anchor="middle">for: strong consistency + auto-HA</text>

  <!-- spectrum arrow -->
  <path d="M40,400 L760,400" stroke="#30363d" stroke-width="2" fill="none"/>
  <text x="120" y="420" fill="#ff7b72" font-size="11">⬅ less durable/consistent, less latency</text>
  <text x="680" y="420" fill="#d2a8ff" font-size="11" text-anchor="end">more durable/consistent, more latency ➡</text>
  <text x="400" y="420" fill="#58a6ff" font-size="10.5" text-anchor="middle">universal: Kafka acks · quorum W · Raft majority · synchronous_commit</text>
</svg>
