<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="430" fill="#0f1419"/>
  <text x="400" y="30" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">10.5 · Replication lag — a replica read is a read of the PAST</text>
  <text x="400" y="50" fill="#8b98a5" font-size="12" text-anchor="middle">async replicas always trail the source · stale reads off a lagging replica cause real money bugs</text>

  <!-- timeline -->
  <text x="60" y="86" fill="#9fd0ff" font-size="11" font-weight="600">SOURCE applied:</text>
  <rect x="200" y="74" width="520" height="22" rx="4" fill="#143a2a" stroke="#2ea043"/>
  <text x="710" y="90" fill="#7ee2a8" font-size="10" text-anchor="end">txn 1000 (now) ▶</text>
  <text x="60" y="116" fill="#d2a8ff" font-size="11" font-weight="600">REPLICA applied:</text>
  <rect x="200" y="104" width="420" height="22" rx="4" fill="#2d2150" stroke="#8957e5"/>
  <text x="610" y="120" fill="#d2a8ff" font-size="10" text-anchor="end">txn 950 ▶</text>
  <rect x="620" y="104" width="100" height="22" rx="4" fill="#3a1a1a" stroke="#da3633" stroke-dasharray="3 2"/>
  <text x="670" y="120" fill="#ff7b72" font-size="9.5" text-anchor="middle">LAG: txns 951–1000</text>

  <!-- causes -->
  <rect x="30" y="148" width="360" height="160" rx="10" fill="#11161c" stroke="#30363d"/>
  <text x="210" y="170" fill="#e6edf3" font-size="12.5" font-weight="700" text-anchor="middle">CAUSES (apply can't keep up)</text>
  <text x="48" y="194" fill="#ff7b72" font-size="11">● single-threaded applier &lt; parallel source writes</text>
  <text x="60" y="210" fill="#f5c2c0" font-size="10">→ fix: PARALLEL replication (10.8)</text>
  <text x="48" y="232" fill="#f0c674" font-size="11">● a long/large transaction stalls the applier</text>
  <text x="60" y="248" fill="#f5e6c7" font-size="10">→ keep txns short (M07/7.15)</text>
  <text x="48" y="270" fill="#9fd0ff" font-size="11">● weak / read-loaded replica hardware</text>
  <text x="48" y="292" fill="#cdb4ff" font-size="11">● slow / distant network (cross-region)</text>

  <!-- measurement -->
  <rect x="410" y="148" width="360" height="160" rx="10" fill="#11161c" stroke="#30363d"/>
  <text x="590" y="170" fill="#e6edf3" font-size="12.5" font-weight="700" text-anchor="middle">MEASUREMENT</text>
  <text x="428" y="194" fill="#f0c674" font-size="11">◻ Seconds_Behind_Source — rough, imperfect</text>
  <text x="440" y="210" fill="#f5e6c7" font-size="10">(can read 0 during stalls — don't trust alone)</text>
  <text x="428" y="232" fill="#7ee2a8" font-size="11">✓ GTID gap — Executed_Gtid_Set diff (exact)</text>
  <text x="428" y="254" fill="#7ee2a8" font-size="11">✓ HEARTBEAT table — row updated every 1s on</text>
  <text x="440" y="270" fill="#a8e6c2" font-size="10">source, measured on replica (robust, precise)</text>
  <text x="428" y="294" fill="#9fd0ff" font-size="11">→ monitor + alert on lag spikes (M13)</text>

  <!-- money bug -->
  <rect x="30" y="320" width="740" height="92" rx="8" fill="#2d1a1a" stroke="#da3633" stroke-width="1.4"/>
  <text x="400" y="342" fill="#ff7b72" font-size="13" font-weight="700" text-anchor="middle">💰 the money bug: stale read off a lagging replica</text>
  <text x="50" y="366" fill="#f5c2c0" font-size="11">user PAYS (source: balance 50 → 0) → immediately checks balance → read goes to a 5s-LAGGING replica → shows OLD balance 50</text>
  <text x="50" y="386" fill="#ff7b72" font-size="11">→ user thinks the payment FAILED → pays AGAIN → DOUBLE CHARGE.  fix: read-after-write (10.6)</text>
  <text x="50" y="404" fill="#8b98a5" font-size="10">reconciliation/reporting on a lagging replica = FINE (tolerates staleness, M02/2.17) · a money-DECISION read = NOT fine</text>
</svg>
