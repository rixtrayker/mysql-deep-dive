<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 500" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="820" height="500" fill="#0f1419"/>
  <text x="410" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">10.16 · The replicated payments platform — money safe across the distribution</text>
  <text x="410" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">a confirmed payment isn't lost on node loss, isn't read stale, and the ledger never forks</text>

  <!-- region 1 -->
  <rect x="20" y="66" width="500" height="220" rx="10" fill="#11161c" stroke="#1f6feb" stroke-width="1.4"/>
  <text x="270" y="86" fill="#9fd0ff" font-size="12.5" font-weight="700" text-anchor="middle">PRIMARY REGION</text>

  <rect x="40" y="98" width="130" height="60" rx="6" fill="#1b3a5c" stroke="#2f6db5" stroke-width="1.5"/>
  <text x="105" y="118" fill="#cde3ff" font-size="11" font-weight="600" text-anchor="middle">PRIMARY</text>
  <text x="105" y="134" fill="#9fd0ff" font-size="9.5" text-anchor="middle">all writes (transfers)</text>
  <text x="105" y="148" fill="#9fd0ff" font-size="9.5" text-anchor="middle">ROW · GTID · sync_binlog=1</text>

  <rect x="220" y="98" width="120" height="60" rx="6" fill="#143a2a" stroke="#2ea043" stroke-width="1.5"/>
  <text x="280" y="116" fill="#7ee2a8" font-size="10.5" font-weight="600" text-anchor="middle">SEMI-SYNC</text>
  <text x="280" y="132" fill="#a8e6c2" font-size="9.5" text-anchor="middle">standby replica</text>
  <text x="280" y="146" fill="#a8e6c2" font-size="9.5" text-anchor="middle">(failover target)</text>

  <rect x="360" y="98" width="140" height="60" rx="6" fill="#2d2150" stroke="#8957e5" stroke-width="1.3"/>
  <text x="430" y="116" fill="#d2a8ff" font-size="10.5" font-weight="600" text-anchor="middle">READ REPLICAS</text>
  <text x="430" y="132" fill="#cdb4ff" font-size="9.5" text-anchor="middle">reporting + reconciliation</text>
  <text x="430" y="146" fill="#cdb4ff" font-size="9.5" text-anchor="middle">(M02/2.17, tolerate lag)</text>

  <path d="M170,122 L218,122" stroke="#2ea043" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <text x="194" y="114" fill="#7ee2a8" font-size="8.5" text-anchor="middle">wait ack</text>
  <path d="M170,140 L358,140" stroke="#8957e5" stroke-width="1.3" fill="none" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#58a6ff"/></marker></defs>

  <rect x="40" y="170" width="460" height="44" rx="6" fill="#11243a" stroke="#2f6db5"/>
  <text x="55" y="188" fill="#9fd0ff" font-size="10.5" font-weight="600">READ ROUTING (ProxySQL, 10.6):</text>
  <text x="55" y="204" fill="#cde3ff" font-size="10">user's OWN balance read after paying → PRIMARY (read-after-write) · other reads/reports → replicas</text>

  <rect x="40" y="222" width="460" height="52" rx="6" fill="#3a2a14" stroke="#d29922"/>
  <text x="55" y="240" fill="#f0c674" font-size="10.5" font-weight="600">AUTOMATED FENCED FAILOVER (InnoDB Cluster / Orchestrator + ProxySQL, 10.13):</text>
  <text x="55" y="256" fill="#f5e6c7" font-size="10">primary dies → fence → promote freshest → GTID re-point → re-route · NO lost money (semi-sync), NO split-brain (10.11)</text>
  <text x="55" y="270" fill="#f0c674" font-size="9.5">super_read_only=ON on replicas (no errant txns, 10.12)</text>

  <!-- DR region -->
  <rect x="540" y="66" width="260" height="120" rx="10" fill="#11161c" stroke="#6e40c9" stroke-width="1.4"/>
  <text x="670" y="86" fill="#cdb4ff" font-size="12" font-weight="700" text-anchor="middle">DR REGION</text>
  <rect x="560" y="100" width="220" height="40" rx="6" fill="#1f1838" stroke="#6e40c9"/>
  <text x="670" y="118" fill="#cdb4ff" font-size="10.5" text-anchor="middle">cross-region replica</text>
  <text x="670" y="132" fill="#b78bff" font-size="9.5" text-anchor="middle">survives a region outage (accepts cross-region lag)</text>
  <text x="670" y="160" fill="#8b98a5" font-size="9.5" text-anchor="middle">+ multi-source aggregation</text>
  <text x="670" y="174" fill="#8b98a5" font-size="9.5" text-anchor="middle">of sharded ledgers (M11)</text>
  <path d="M500,122 L558,118" stroke="#6e40c9" stroke-width="1.3" fill="none" marker-end="url(#a)"/>

  <!-- binlog uses -->
  <rect x="540" y="200" width="260" height="86" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.3"/>
  <text x="670" y="220" fill="#7ee2a8" font-size="11.5" font-weight="700" text-anchor="middle">the binlog also feeds (10.14):</text>
  <text x="560" y="242" fill="#a8e6c2" font-size="10">● PITR backups (M13) — recover the ledger</text>
  <text x="575" y="256" fill="#a8e6c2" font-size="9.5">to any point (e.g. before a bad migration)</text>
  <text x="560" y="274" fill="#a8e6c2" font-size="10">● CDC → Kafka (M12) — fraud / notifications / outbox</text>

  <!-- what survives -->
  <rect x="20" y="300" width="780" height="120" rx="8" fill="#143a2a" stroke="#2ea043" stroke-width="1.5"/>
  <text x="410" y="322" fill="#7ee2a8" font-size="13" font-weight="700" text-anchor="middle">a confirmed transfer SURVIVES every failure (money-never-lies across the distribution)</text>
  <text x="40" y="346" fill="#a8e6c2" font-size="11">✓ primary process crash → M09 redo replay   ✓ power loss → M09 fsync to honest storage   ✓ torn page → M09 doublewrite</text>
  <text x="40" y="368" fill="#7ee2a8" font-size="11" font-weight="600">✓ TOTAL primary node/disk loss → semi-sync replica HAS it (extends M09 beyond one node)   ✓ region loss → DR replica</text>
  <text x="40" y="390" fill="#9fd0ff" font-size="11">✓ failover loses NO confirmed money (semi-sync + fence + freshest + GTID)   ✓ ledger never FORKS (fence/quorum + ROW)</text>
  <text x="40" y="410" fill="#f0c674" font-size="11">✓ users never read a STALE balance they just changed (read-after-write)   ⚠ MONITOR semi-sync status + lag (verify, don't assume, 10.12)</text>

  <text x="410" y="446" fill="#58a6ff" font-size="11.5" text-anchor="middle" font-weight="600">durable beyond one node (sync repl) · exactly one leader (fence/quorum) · read-your-writes · verified (monitored)</text>
  <text x="410" y="470" fill="#8b98a5" font-size="10.5" text-anchor="middle">M11 shards the WRITES this replicates · M12 generalizes the binlog integration (CDC/outbox) · M15 = catastrophic failures · M16 = the platform</text>
  <text x="410" y="490" fill="#8b98a5" font-size="10" text-anchor="middle">the cost of these guarantees is justified by the cost of their failure</text>
</svg>
