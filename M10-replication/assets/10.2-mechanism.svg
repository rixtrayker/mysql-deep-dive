<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 410" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="410" fill="#0f1419"/>
  <text x="400" y="30" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">10.2 · The mechanism — binlog → relay log → apply (log shipping)</text>
  <text x="400" y="50" fill="#8b98a5" font-size="12" text-anchor="middle">ship the binlog (M09), replay it elsewhere — same idea as crash recovery (9.14) &amp; event sourcing (M01/1.17)</text>

  <!-- SOURCE -->
  <rect x="30" y="80" width="220" height="250" rx="10" fill="#11161c" stroke="#1f6feb" stroke-width="1.6"/>
  <text x="140" y="102" fill="#9fd0ff" font-size="13" font-weight="700" text-anchor="middle">SOURCE (primary)</text>
  <rect x="48" y="116" width="184" height="44" rx="6" fill="#1b3a5c" stroke="#2f6db5"/>
  <text x="140" y="134" fill="#cde3ff" font-size="11" text-anchor="middle">handle writes (transfers)</text>
  <text x="140" y="150" fill="#9fd0ff" font-size="10" text-anchor="middle">commit → durable locally (redo, M09)</text>
  <rect x="48" y="168" width="184" height="56" rx="6" fill="#143a2a" stroke="#2ea043"/>
  <text x="140" y="187" fill="#7ee2a8" font-size="11.5" font-weight="600" text-anchor="middle">BINARY LOG (M09)</text>
  <text x="140" y="204" fill="#a8e6c2" font-size="10" text-anchor="middle">[txn1][txn2][txn3]… (ordered,</text>
  <text x="140" y="218" fill="#a8e6c2" font-size="10" text-anchor="middle">durable stream of all changes)</text>
  <text x="140" y="250" fill="#8b98a5" font-size="10" text-anchor="middle">the authoritative change stream</text>
  <text x="140" y="266" fill="#8b98a5" font-size="10" text-anchor="middle">— replicas, PITR, CDC all read it (10.14)</text>

  <!-- arrows source -> replica -->
  <path d="M252,200 L320,200" stroke="#58a6ff" stroke-width="2.5" fill="none" marker-end="url(#a)"/>
  <text x="286" y="190" fill="#58a6ff" font-size="10" text-anchor="middle">stream</text>
  <text x="286" y="214" fill="#8b98a5" font-size="9" text-anchor="middle">(network)</text>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#58a6ff"/></marker></defs>

  <!-- REPLICA -->
  <rect x="330" y="80" width="440" height="250" rx="10" fill="#11161c" stroke="#8957e5" stroke-width="1.6"/>
  <text x="550" y="102" fill="#d2a8ff" font-size="13" font-weight="700" text-anchor="middle">REPLICA</text>

  <rect x="348" y="116" width="404" height="44" rx="6" fill="#2d2150" stroke="#8957e5"/>
  <text x="362" y="134" fill="#e7d6ff" font-size="11" font-weight="600">① IO / receiver thread — streams the binlog</text>
  <text x="362" y="150" fill="#cdb4ff" font-size="10">just network + local logging · tracks how far RECEIVED</text>

  <rect x="348" y="168" width="404" height="44" rx="6" fill="#3a2a14" stroke="#d29922"/>
  <text x="362" y="186" fill="#f5e6c7" font-size="11" font-weight="600">② RELAY LOG — local copy of the received binlog stream</text>
  <text x="362" y="202" fill="#f0c674" font-size="10">decouples RECEIVE from APPLY (can receive ahead of applying)</text>

  <rect x="348" y="220" width="404" height="60" rx="6" fill="#143a2a" stroke="#2ea043"/>
  <text x="362" y="238" fill="#c7f5d9" font-size="11" font-weight="600">③ SQL / applier thread(s) — replay the relay log</text>
  <text x="362" y="254" fill="#a8e6c2" font-size="10">execute changes → replica data matches source · tracks how far APPLIED</text>
  <text x="362" y="270" fill="#7ee2a8" font-size="10">parallel replication = multiple workers replay independent txns (10.8)</text>

  <text x="550" y="302" fill="#f0c674" font-size="10.5" text-anchor="middle">two positions: RECEIVED (relay) vs APPLIED (executed) — gap = REPLICATION LAG (10.5)</text>

  <text x="400" y="360" fill="#58a6ff" font-size="11.5" text-anchor="middle" font-weight="600">state-machine replication: replay an ordered, durable log → reconstruct identical state on any node</text>
  <text x="400" y="384" fill="#8b98a5" font-size="10.5" text-anchor="middle">semi-sync (10.4): source WAITS for the replica's RECEIPT ack before commit returns — a sync point at step ①/②</text>
</svg>
