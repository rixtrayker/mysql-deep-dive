<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
  <rect width="800" height="470" fill="#0f1419"/>
  <text x="400" y="28" fill="#e6edf3" font-size="18" font-weight="700" text-anchor="middle">10.9 · Replication topologies — compose the shape per requirement</text>
  <text x="400" y="48" fill="#8b98a5" font-size="12" text-anchor="middle">fan-out (read scale) · chained (load/geo) · multi-source (aggregate) · group (consensus HA)</text>

  <!-- FAN-OUT -->
  <rect x="20" y="66" width="375" height="190" rx="10" fill="#11161c" stroke="#1f6feb" stroke-width="1.4"/>
  <text x="207" y="86" fill="#9fd0ff" font-size="12.5" font-weight="700" text-anchor="middle">SOURCE → MANY REPLICAS (fan-out)</text>
  <rect x="170" y="98" width="76" height="32" rx="6" fill="#1b3a5c" stroke="#2f6db5"/><text x="208" y="118" fill="#cde3ff" font-size="10" text-anchor="middle">SOURCE</text>
  <rect x="50" y="170" width="76" height="30" rx="6" fill="#2d2150" stroke="#8957e5"/><text x="88" y="189" fill="#d2a8ff" font-size="10" text-anchor="middle">replica</text>
  <rect x="170" y="170" width="76" height="30" rx="6" fill="#2d2150" stroke="#8957e5"/><text x="208" y="189" fill="#d2a8ff" font-size="10" text-anchor="middle">replica</text>
  <rect x="290" y="170" width="76" height="30" rx="6" fill="#2d2150" stroke="#8957e5"/><text x="328" y="189" fill="#d2a8ff" font-size="10" text-anchor="middle">standby</text>
  <path d="M195,130 L95,168" stroke="#58a6ff" stroke-width="1.3" fill="none"/>
  <path d="M208,130 L208,168" stroke="#58a6ff" stroke-width="1.3" fill="none"/>
  <path d="M221,130 L320,168" stroke="#58a6ff" stroke-width="1.3" fill="none"/>
  <text x="207" y="222" fill="#7ee2a8" font-size="10.5" text-anchor="middle">→ read scaling + HA (multiple failover targets)</text>
  <text x="207" y="240" fill="#8b98a5" font-size="9.5" text-anchor="middle">the workhorse · source = single write point</text>

  <!-- CHAINED -->
  <rect x="405" y="66" width="375" height="190" rx="10" fill="#11161c" stroke="#d29922" stroke-width="1.4"/>
  <text x="592" y="86" fill="#f0c674" font-size="12.5" font-weight="700" text-anchor="middle">CHAINED (relay)</text>
  <rect x="430" y="110" width="76" height="30" rx="6" fill="#1b3a5c" stroke="#2f6db5"/><text x="468" y="129" fill="#cde3ff" font-size="10" text-anchor="middle">SOURCE</text>
  <rect x="555" y="110" width="76" height="30" rx="6" fill="#2d2150" stroke="#8957e5"/><text x="593" y="129" fill="#d2a8ff" font-size="10" text-anchor="middle">replica</text>
  <rect x="680" y="110" width="76" height="30" rx="6" fill="#2d2150" stroke="#8957e5"/><text x="718" y="129" fill="#d2a8ff" font-size="10" text-anchor="middle">replica</text>
  <path d="M506,125 L553,125" stroke="#d29922" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M631,125 L678,125" stroke="#d29922" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="592" y="170" fill="#f5e6c7" font-size="10.5" text-anchor="middle">replica replicates from another replica</text>
  <text x="592" y="190" fill="#7ee2a8" font-size="10.5" text-anchor="middle">→ offload source · bridge regions</text>
  <text x="592" y="212" fill="#ff7b72" font-size="10" text-anchor="middle">⚠ additive lag per hop · longer failure chain</text>

  <!-- MULTI-SOURCE -->
  <rect x="20" y="270" width="375" height="180" rx="10" fill="#11161c" stroke="#2ea043" stroke-width="1.4"/>
  <text x="207" y="290" fill="#7ee2a8" font-size="12.5" font-weight="700" text-anchor="middle">MULTI-SOURCE (aggregate)</text>
  <rect x="40" y="306" width="70" height="28" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="75" y="324" fill="#cde3ff" font-size="9.5" text-anchor="middle">shard A</text>
  <rect x="40" y="344" width="70" height="28" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="75" y="362" fill="#cde3ff" font-size="9.5" text-anchor="middle">shard B</text>
  <rect x="40" y="382" width="70" height="28" rx="5" fill="#1b3a5c" stroke="#2f6db5"/><text x="75" y="400" fill="#cde3ff" font-size="9.5" text-anchor="middle">shard C</text>
  <rect x="270" y="344" width="100" height="34" rx="6" fill="#13361f" stroke="#2ea043"/><text x="320" y="365" fill="#7ee2a8" font-size="10" text-anchor="middle">reporting replica</text>
  <path d="M112,320 L268,355" stroke="#2ea043" stroke-width="1.3" fill="none"/>
  <path d="M112,358 L268,361" stroke="#2ea043" stroke-width="1.3" fill="none"/>
  <path d="M112,396 L268,367" stroke="#2ea043" stroke-width="1.3" fill="none"/>
  <text x="207" y="428" fill="#a8e6c2" font-size="10" text-anchor="middle">→ combine sharded ledgers (M11) for global reporting (M02/2.17)</text>

  <!-- GROUP -->
  <rect x="405" y="270" width="375" height="180" rx="10" fill="#11161c" stroke="#8957e5" stroke-width="1.6"/>
  <text x="592" y="290" fill="#d2a8ff" font-size="12.5" font-weight="700" text-anchor="middle">GROUP REPLICATION (consensus)</text>
  <circle cx="500" cy="350" r="26" fill="#2d2150" stroke="#8957e5"/><text x="500" y="354" fill="#e7d6ff" font-size="9.5" text-anchor="middle">node</text>
  <circle cx="592" cy="330" r="26" fill="#2d2150" stroke="#8957e5"/><text x="592" y="334" fill="#e7d6ff" font-size="9.5" text-anchor="middle">node</text>
  <circle cx="684" cy="350" r="26" fill="#2d2150" stroke="#8957e5"/><text x="684" y="354" fill="#e7d6ff" font-size="9.5" text-anchor="middle">node</text>
  <path d="M524,344 L568,336" stroke="#6e40c9" stroke-width="1.3"/>
  <path d="M616,336 L660,344" stroke="#6e40c9" stroke-width="1.3"/>
  <path d="M526,355 L658,355" stroke="#6e40c9" stroke-width="1.3"/>
  <text x="592" y="400" fill="#cdb4ff" font-size="10" text-anchor="middle">majority CERTIFIES each txn (InnoDB Cluster, 10.13)</text>
  <text x="592" y="420" fill="#7ee2a8" font-size="10" text-anchor="middle">→ strong consistency + auto-failover + no split-brain (10.11)</text>
  <text x="592" y="438" fill="#ff7b72" font-size="9.5" text-anchor="middle">⚠ coordination latency · needs ≥3 nodes</text>

  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#d29922"/></marker></defs>
</svg>
